      Re-run by this project against the National Monuments Service SMROpenData
      FeatureServer on 2026-07-21: MONUMENT_CLASS LIKE 'Castle%' returns 4,552,
      comprising unclassified 2,466, tower house 1,321, motte 258,
      motte-and-bailey 175, ringwork 138, Anglo-Norman masonry castle 129,
