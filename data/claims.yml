  - id: ie-castles-129
    claim: "Ireland has about 100 castles"
    value: 129
    definition: fortified_residence
    jurisdiction: IE
    grade: derived
    assessment: >
      Asserted off the cuff in the originating Hacker News thread by a commenter
      applying the strict definition — excluding crannógs, Dún Aonghasa and
      standalone tower houses — and estimating "probably something around 100"
      Anglo-Norman castles. The Irish SMR's own answer to that precise question is
      129 records of class 'Castle - Anglo-Norman masonry castle'. The estimate was
      accurate to within 30%, and the underlying point stands: the same official
      database answers "how many castles does Ireland have?" with 129, 4,552 or
      31,431 depending purely on which class filter is accepted. This is the
      cleanest demonstration of this project's thesis anywhere in the dataset.
    supersedes: ie-castles-4552
    sources:
      - url: "https://news.ycombinator.com/item?id=48995032"
        title: "Comment on 'The World's 2,400 Castles'"
        publisher: "Hacker News"
        date: "2026-07-21"
      - url: "https://www.archaeology.ie/collections-and-publications/open-data/"
        title: "Archaeological Survey of Ireland — open data"
        publisher: "National Monuments Service"
        date: "2026-07-21"
    last_updated: "2026-07-21"

  - id: ie-ringforts-31431
    claim: "Ireland has 30,000+ prehistoric forts"
    value: 31431
    definition: enclosure_fortification
    jurisdiction: IE
    grade: derived
    assessment: >
      Substantially correct, and now precisely sourceable. The Irish SMR returns
      31,431 records for MONUMENT_CLASS LIKE 'Ringfort%' (rath 26,000, cashel 3,551,
      unclassified 1,880), against a total of 151,308 SMR records. The scholarly
      figure is larger because it counts structures CONSTRUCTED rather than
      surviving — see ie-ringforts-45000.

      CORRECTION TO THIS PROJECT'S OWN FOUNDING BRIEF: the "30,000+" figure was NOT
      asserted in the originating thread, it was DENIED there — a commenter wrote
      that "the idea of 30K castles in Ireland is clearly untrue." He was right and
      wrong in different places, and the split is exactly this dataset's thesis:
      wrong that the 30,000 figure is fictional (the SMR holds 31,431 ringfort-class
      records), right that they are not castles (the same register holds 4,552
      Castle-class records, and 129 Anglo-Norman masonry castles). The dispute was
      never about the data. It was about the word.
    sources:
      - url: "https://www.archaeology.ie/collections-and-publications/open-data/"
        title: "Archaeological Survey of Ireland — open data"
        publisher: "National Monuments Service"
        date: "2026-07-21"
    last_updated: "2026-07-21"

  - id: ie-ringforts-45000
    claim: "About 45,000 ringforts were built in Ireland"
    value: 45000
    definition: enclosure_fortification
    jurisdiction: IE
    grade: scholarly
    assessment: >
      Attributed to Matthew Stout, The Irish Ringfort (Four Courts Press, 1997;
      reprinted 2023), built on the all-Ireland ringfort database compiled by the
      archaeological surveys and extrapolated for loss — Stout notes roughly 37%
      have been swept away since the first Ordnance Survey. Consistent rather than
      competing with the 31,431 recorded: the gap IS the attrition. CAVEAT, and it
      matters: the 45,000 figure is taken from a History Ireland review
      characterising the book, not from the book's own text, which this project has
      not read. Competing tourism figures of 50,000 and 60,000 are folklore with no
      traceable source.
    sources:
      - url: "https://www.fourcourtspress.ie/books/2023/the-irish-ringfort"
        title: "The Irish Ringfort — Matthew Stout"
        publisher: "Four Courts Press"
        date: "2023"
      - url: "https://historyireland.com/irish-ringforts-matthew-stout-four-courts-pressgroup-for-the-study-of-irish-historic-settlement-19-95-isbn-1-85182-300-x/"
        title: "Review: Irish Ringforts"
        publisher: "History Ireland"
        note: "The proximate source of the 45,000 figure used here."
    last_updated: "2026-07-21"

  - id: de-sn-fortifications-700
    claim: "Saxony alone has 700+ fortifications, with about 100 touristically interesting"
    value: null
    value_range: [700, 821]
    definition: null
    jurisdiction: DE-SN
    grade: circulating
    assessment: >
      TRUE, BUT IT COUNTS SOMETHING ELSE — and this is the most instructive claim in
      the ledger, because the trap is invisible without checking.

      The figure that can be read at source is Susanne Grunwald (Leipziger
      online-Beiträge zur Ur- und Frühgeschichtlichen Archäologie 2, 2003, p. 1):
      "Hier sind inzwischen mehr als 700 vor- und frühgeschichtliche befestigte
      Siedlungen bekannt" — more than 700 PREHISTORIC AND EARLY-HISTORIC FORTIFIED
      SETTLEMENTS, that is, earthwork Burgwälle. Those are categorically distinct
      from the medieval stone Burgen the thread was discussing, and Grunwald gives
      no citation for the number, so it is an unreferenced scholarly assertion
      rather than a register count.

      Two separate medieval figures also exist and are close enough to collide with
      it: 723 high- and late-medieval Wehranlagen (Müller & Dehn, Burgenwanderung
      durch Sachsen, 2006), of which 93 are picked out as "touristisch interessant"
      — plausibly the source of the thread's "about 100" — and 821 securely
      verifiable installations (Billig & Müller, Burgen. Zeugen sächsischer
      Geschichte, 1998). BOTH were verified only through the German Wikipedia
      article quoting them, not from the works themselves.

      So: read as prehistoric earthworks the claim is sourceable but not about
      castles; read as medieval castles it is UNVERIFIED and rests on a coincidence
      between two unrelated counts that both happen to be about 700. No Landesamt
      figure exists to settle it — Saxony's register classifies by Denkmalart
      (Kulturdenkmal, Gartendenkmal, Sachgesamtheit…) with no Burg, Schloss or
      Wehranlage category anywhere, and archaeological monuments sit with a
      different agency entirely. The coverage gap that provoked the thread is real;
      the number attached to it is three numbers wearing a coat.
    sources:
      - url: "https://de.wikipedia.org/wiki/Liste_von_Burgen_und_Schl%C3%B6ssern_in_Sachsen"
        title: "Liste von Burgen und Schlössern in Sachsen"
        publisher: "Wikipedia (de)"
        note: "Quotes Müller/Dehn 723 and Billig/Müller 821; neither work was consulted directly."
      - url: "https://denkmalliste.denkmalpflege.sachsen.de/Gast/Denkmalliste_Sachsen.aspx"
        title: "Denkmalliste Sachsen"
        publisher: "Landesamt für Denkmalpflege Sachsen"
        note: "Over 100,000 Denkmale, classified by Denkmalart with no fortification category. Licensed CC BY-NC-ND 3.0 DE — not open data — and no bulk download was found."
      - url: "https://news.ycombinator.com/item?id=48994810"
        title: "Comment on 'The World's 2,400 Castles'"
        publisher: "Hacker News"
        date: "2026-07-21"
        note: "\"Germany's Saxony alone has 700+ fortications with about 100 being touristically interesting. In the map I count like 9.\""
    last_updated: "2026-07-21"

  - id: de-castles-20000-25000
    claim: "Germany has around 25,000 castles"
    value: null
    value_range: [20000, 25000]
    definition: fortified_residence
    jurisdiction: DE
    grade: circulating
    assessment: >
      Attributed to the Deutsche Burgenvereinigung and stated there as an
      extrapolation (Hochrechnungen) with the basis undisclosed, and — critically —
      with an inclusion rule that is usually dropped in quotation: it counts former
      castles INCLUDING ruins and bare castle sites (Burgstellen).

      THIS PROJECT'S OWN RESEARCH DISAGREES WITH ITSELF HERE, and the disagreement
      is published rather than resolved. One research pass read the range at the
      DBV's own projects page; a second pass could not verify it and recommended
      treating it as unverified. Under the signal > canon rule the conflict stays
      visible: it is graded circulating rather than official, and anyone relying on
      it should re-check the source. This is what the doctrine costs and what it
      buys — a number this dataset cannot stand behind is labelled instead of
      quietly promoted.

      Cite it as a range with the ruins-and-sites inclusion rule attached, never as
      the hard "25,000" it becomes in circulation.
    sources:
      - url: "https://www.deutsche-burgen.org/de/verein-startseite/projekte.html"
        title: "Projekte"
        publisher: "Deutsche Burgenvereinigung"
    last_updated: "2026-07-21"

  - id: world-osm-castles-54182
    claim: "OpenStreetMap holds 54,182 objects tagged historic=castle"
    value: 54182
    definition: null
    jurisdiction: WORLD
    grade: derived
    assessment: >
      Read from the taginfo API on 2026-07-21: 14,638 nodes and 35,203 ways. The
      interesting figure is not the total but the breakdown: castle_type is present
      on only 28,544 of them, across 223 distinct values with no enforced
      enumeration, and only 19.5% of those are tagged defensive against 23.7%
      stately, 20.5% manor and 16.4% palace. Under the strict definition roughly four
      in five things tagged historic=castle are misfiled — or, read the other way,
      the crowd's working definition of "castle" is overwhelmingly stately residence
      rather than fortress. The tag also contains castle_type=castle, a tautology
      typed 517 times.
    sources:
      - url: "https://taginfo.openstreetmap.org/"
        title: "taginfo"
        publisher: "OpenStreetMap"
        date: "2026-07-21"
    last_updated: "2026-07-21"

  - id: world-wikidata-36716
    claim: "Wikidata holds 36,716 castles"
    value: 36716
    definition: null
    jurisdiction: WORLD
    grade: derived
    assessment: >
      Queried live on 2026-07-21. The number depends entirely on a choice most
      Wikidata-derived datasets never state: direct instances of Q23413 return
      24,886, while walking the subclass tree (P31/P279*) returns 36,716. Of the
      subclass-inclusive set, 33,265 carry coordinates and 6,594 carry both
      coordinates and an English Wikipedia article. The depth of the subclass walk
      is a definitional choice, and any dataset built on Wikidata has made it
      whether or not it says so.
    sources:
      - url: "https://query.wikidata.org/"
        title: "Wikidata Query Service"
        publisher: "Wikimedia Foundation"
        date: "2026-07-21"
    last_updated: "2026-07-21"

  - id: world-thecastlemap-2435
    claim: "There are 2,435 castles in the world"
    value: 2435
    definition: popular_castle
    jurisdiction: WORLD
    grade: circulating
    assessment: >
      thecastlemap.com's published total across 129 countries — 937 castles, 389
      fortresses, 692 palaces and châteaux, 417 ruins — and the claim that prompted
      this project. Graded circulating rather than derived because the published
      figure does not follow from the site's own stated rule. Its criteria are a
      real photo, an English Wikipedia article and exact coordinates; this project's
      live Wikidata query for castle-or-subclass items carrying BOTH coordinates and
      an English Wikipedia article returns 6,594. The map publishes 2,435 — about
      37% of the population its own filter defines. The site does declare a
      curatorial rule on its homepage ("balanced across 129 countries so the map
      stays explorable"), so the selection is disclosed; what is not disclosed is
      that the result is a selection rather than a census, and "The World's 2,400
      Castles" reads as the latter. The underlying work is careful, openly licensed
      and honest about its Wikidata provenance — the criticism here is narrow and
      is about the framing of a number, not the quality of a map.
    sources:
      - url: "https://thecastlemap.com/castles/ranked/"
        title: "Castles ranked by fame"
        publisher: "thecastlemap.com"
        date: "2026-07-21"
      - url: "https://query.wikidata.org/"
        title: "Wikidata Query Service"
        publisher: "Wikimedia Foundation"
        date: "2026-07-21"
        note: "The 6,594 counter-figure."
      - url: "https://news.ycombinator.com/item?id=48996583"
        title: "Comment on 'The World's 2,400 Castles'"
        publisher: "Hacker News"
        date: "2026-07-21"
        note: "\"The point is not the rounding, it is that it is not counting a total number of castles, but rather some subset of 'significant' castles.\""
