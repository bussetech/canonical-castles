  - id: gb-wls-castles-104
    claim: "Wales has 104 scheduled castles"
    value: 104
    definition: fortified_residence
    jurisdiction: GB-WLS
    grade: derived
    assessment: >
      Queried against Cadw's scheduled-monument layer via DataMapWales on
      2026-07-21. Wales is the best-classified castle register in Britain: unlike
      England and Scotland, Cadw's data carries an explicit SiteType field, so
      "castle" is a real filter rather than a keyword guess. SiteType = "Castle"
      returns 104, against 4,237 scheduled monuments in total. But the band answer
      moves with the filter, as always — BroadClass = "Defence" returns 1,019, and
      the adjacent classes are counted separately (Motte 156, Motte and Bailey 72,
      Hillfort 287, Moated Site 69). Coflein, the wider Welsh record of 112,894
      terrestrial sites, independently returns 158 for site_type = 'CASTLE' and 180
      for a looser match. So Wales is simultaneously a 104-castle country, a
      158-castle country, a 332-castle country if mottes count, and a
      1,019-fortification country. GOTCHA worth recording for anyone reproducing
      this: the SiteType values are title-case and a case-sensitive filter silently
      returns zero rather than erroring.
    sources:
      - url: "https://cadw.gov.wales/advice-support/cof-cymru"
        title: "Cof Cymru — National Historic Assets of Wales"
        publisher: "Cadw"
        date: "2026-07-21"
      - url: "https://www.coflein.gov.uk/"
        title: "Coflein — National Monuments Record of Wales"
        publisher: "Royal Commission on the Ancient and Historical Monuments of Wales"
        date: "2026-07-21"
    last_updated: "2026-07-21"

  - id: gb-nir-castles-4
    claim: "Northern Ireland has 4 castles"
    value: 4
    definition: fortified_residence
    jurisdiction: GB-NIR
    grade: derived
    assessment: >
      Literally what the register returns, and a perfect illustration of why a
      number read straight out of a database can be worse than no number at all.
      The Northern Ireland Sites and Monuments Record holds 18,506 records; querying
      General_Type = 'CASTLE' returns 4. Northern Ireland obviously has more than
      four castles. They are classified elsewhere: FORTIFICATION (353) and MOTTE
      (48). The decisive detail is the tower houses — of 61 records whose text
      mentions "tower-house", 55 are classified FORTIFICATION, and exactly ONE
      record in the entire database carries General_Type = 'TOWER HOUSE'. Anyone
      building a castle dataset by filtering national registers on a castle field
      would report 4 for Northern Ireland and never notice. Recorded here as a
      worked example of the failure mode, not as a fact about castles.
    sources:
      - url: "https://apps.communities-ni.gov.uk/Buildings/buildMain.aspx"
        title: "Northern Ireland Sites and Monuments Record"
        publisher: "Department for Communities"
        date: "2026-07-21"
    last_updated: "2026-07-21"

  - id: es-castles-uncountable
    claim: "Spain has [no derivable castle count]"
    value: null
    definition: fortified_residence
    jurisdiction: ES
    grade: folklore
    assessment: >
      Recorded as an absence with a legal cause, which makes Spain the most
      interesting negative result in this dataset. The Decreto de 22 de abril de
      1949 places ALL castles in Spain under state protection "cualquiera que sea
      su estado de ruina" — whatever their state of ruin — with no individual
      declaration proceeding, and Ley 16/1985 (Disposición adicional segunda)
      converted that blanket protection into Bien de Interés Cultural status
      automatically. Spanish castles are therefore protected BY OPERATION OF LAW
      rather than by inscription, so no enumerated list is derivable even in
      principle: the protected class is open-ended, and anything later determined
      to be a castle was already protected in 1949. Proof that this is the operative
      reading rather than a technicality: a 1994 Andalusian resolution terminated
      the pending individual declaration file for the Castillo de Bélmez as
      unnecessary, because the castle already held BIC status via that provision.
      A name search for "castillo" returns 2,017, but that figure is contaminated
      (it catches churches named for a castle) and incomplete (it misses every
      alcazaba, torre, fortaleza, castell, gaztelu and castelo) — it is neither an
      upper nor a lower bound and is not used here. A first inventory of 1949–62
      catalogued roughly 5,200 castles and defensive elements; that is a historical
      artefact, not a current count.
    sources:
      - url: "https://www.juntadeandalucia.es/boja/1994/126/39"
        title: "Resolución — Castillo de Bélmez"
        publisher: "Boletín Oficial de la Junta de Andalucía"
        date: "1994"
        note: "Terminates an individual BIC declaration as unnecessary given the 1949 decree — the clearest evidence that protection is automatic."
      - url: "https://www.cultura.gob.es/planes-nacionales/dam/jcr:d7c490b8-eac4-4bd8-94f5-aacc93c1fa27/decreto-de-22-de-abril-de-1949-sobre-proteccion-de-los-castillos-espa-oles.pdf"
        title: "Decreto de 22 de abril de 1949 sobre protección de los castillos españoles"
        publisher: "Ministerio de Cultura"
        date: "1949"
        note: "Verbatim article text confirmed at second hand: the BOE HTML record reads 'Texto no disponible' and this PDF is a scan with no text layer."
    last_updated: "2026-07-21"

  - id: gb-eng-castle-count
    claim: "England has [no verified castle count]"
    value: null
    definition: fortified_residence
    jurisdiction: GB-ENG
    grade: folklore
    assessment: >
      Recorded as an absence, deliberately, and the cause is more interesting than
      the absence. England has an openly licensed, bulk-downloadable national
      register — 379,680 listed buildings and 19,998 scheduled monuments — and this
      project still cannot say how many castles are in it, because THE BULK SCHEMA
      HAS NO TYPE FIELD AT ALL. The published columns are entry number, name, grade,
      dates, capture scale, link and grid reference; `Grade` is importance (I, II*,
      II), not typology. There is a controlled vocabulary — the FISH monument-type
      thesaurus, whose term for castle reads "A fortress and dwelling, usually
      medieval in origin" — but it is not applied in the National Heritage List, so
      it cannot be filtered on.

      What remains is keyword matching on the Name column, which returns 1,190
      scheduled monuments and 3,237 listed buildings. That figure is worthless in
      both directions at once: it catches Castle Farm and misses every unnamed
      motte. A live count against Historic England's ArcGIS FeatureServer returned
      "499 Token Required", and the website returns HTTP 403 to automated access
      generally. The only official castle-class figure verified anywhere is a
      monument-class boilerplate line that over 600 motte and motte-and-bailey
      castles are recorded nationally.

      Numerous tourism figures circulate; none is used. An unanswered question with
      its blocker named is worth more than a borrowed number.
