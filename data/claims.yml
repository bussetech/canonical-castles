  - id: gb-wls-per-square-mile
    claim: "Wales has more castles per square mile than anywhere in the world"
    value: null
    definition: null
    jurisdiction: GB-WLS
    grade: folklore
    assessment: >
      No source, and no methodology anywhere. Two tells mark it as folklore rather
      than a merely unverified statistic: it circulates in mutually inconsistent
      forms ("in the world" versus "in Europe"), and the counts it would depend on
