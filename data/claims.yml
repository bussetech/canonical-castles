# The numbers people repeat about castles, graded by how well they are sourced.
#
# The grade is about METHOD, not plausibility. A folkloric number can be roughly
# right and an official one can be misread — the point is whether anyone can
# check it. There is a usable signature here, visible once the claims are laid
# side by side: every citable figure has a named author or operator, a datable
# publication and a disclosed underlying database, while every folkloric one is
# a round number with no author, circulating in several magnitudes at once.
version: 1

claims:
  - id: fr-45000-chateaux
    claim: "France has 45,000 châteaux"
    value: 45000
    definition: null
    jurisdiction: FR
    grade: folklore
    assessment: >
      No primary source could be found. Every instance traces to content farms,
      estate-agent marketing or tourism copy citing nothing, and no methodology is
      stated anywhere. There is no earliest traceable use: the variants (20,000 /
      30,000 / 40,000 / 45,000) circulate simultaneously rather than evolving from
      a datable original, which is the signature of a meme rather than a statistic.
      A frequently-alleged attribution to Demeure Historique or VMF could not be
      confirmed — La Demeure Historique's own site describes roughly 3,000 member
      monuments and makes no national estimate. Note the uncomfortable proximity of
      the official 45,223 protected monuments historiques (see fr-mh-45223): this
      project's hypothesis is that "45,000 châteaux" is a corruption of that figure,
      which counts something entirely different. THAT HYPOTHESIS IS UNPROVEN and is
      recorded as a hypothesis, not a finding. The claim maps to no definition band
      at all, which is part of why it cannot be checked.
    sources:
      - url: "https://www.chateautheque.fr/"
        title: "Châteauthèque"
        note: "The best-sourced French enumeration found: 27,466 châteaux, manoirs, forteresses et maisons fortes in metropolitan France, with an explicit aggregation method over Base Mérimée, Wikidata, Wikipédia, Wikimedia Commons, BnF Gallica and DataTourisme. It produces no original data and inherits its sources' gaps, but it is the only French figure encountered with a stated method — and it is 40% below the folkloric number."
      - url: "https://news.ycombinator.com/item?id=48994178"
        title: "The World's 2,400 Castles"
        publisher: "Hacker News"
        date: "2026-07-21"
        note: "Where the 20,000–45,000 range was asserted in the discussion that prompted this project."
    last_updated: "2026-07-21"

  - id: fr-mh-45223
    claim: "France has 45,223 protected monuments historiques"
    value: 45223
    definition: null
    jurisdiction: FR
    grade: official
    assessment: >
      The Ministry of Culture's own figure as of 31 December 2024: 14,333 classés
      plus 30,890 inscrits. Verified against the Ministry's published bilan. It
      counts protected immeubles of every kind — overwhelmingly dwellings and
      churches, with military architecture roughly 6% — so it is emphatically NOT
      a castle count, and is recorded here only because its proximity to the
      folkloric 45,000 is hard to ignore.
    sources:
      - url: "https://www.culture.gouv.fr/thematiques/monuments-sites/ressources/les-bilans/la-protection-au-titre-des-monuments-historiques-bilan-2024-chiffres-clefs-au-1er-janvier-2025"
        title: "La protection au titre des monuments historiques — bilan 2024"
        publisher: "Ministère de la Culture"
        date: "2025"
    last_updated: "2026-07-21"

  - id: fr-chateaux-6286
    claim: "France has 6,286 protected châteaux"
    value: 6286
    definition: fortified_residence
    jurisdiction: FR
    grade: derived
    assessment: >
      Derived from the Base Mérimée bulk extract of protected monuments historiques
      on 2026-07-21, and published here with its tokenisation rule attached because
      the rule IS the number. The denomination field is semicolon-delimited free
      text with 1,998 distinct values, so every plausible rule gives a different
      answer: token exactly "château" returns 6,159; token in {château, château
      fort} returns 6,285; prefix "château" excluding "château d'eau" returns 6,286;
      "château" as sole denomination returns 5,703. All four are defensible and they
      differ only by tokenisation. The excluded term matters — château d'eau is a
      WATER TOWER, and a naive prefix match silently imports them.

      Two further traps for anyone reproducing this. Casing is not normalised
      (château 5,703 against Château 1), and neither is hyphenation (château fort
      104 against château-fort 1). More seriously, Mérimée mixes legally protected
      monuments historiques with Inventaire général records carrying no protection
      at all: the bulk CSV is pre-filtered to protected monuments, but the same
      count taken through the POP search interface would silently include hundreds
      of thousands of unprotected records. That is a category error, not a rounding
      difference.

      Against the folkloric 20,000–45,000 (see fr-45000-chateaux), the register
      supports roughly one order of magnitude less.
    sources:
      - url: "https://www.data.gouv.fr/datasets/immeubles-proteges-au-titre-des-monuments-historiques-2"
        title: "Immeubles protégés au titre des monuments historiques"
        publisher: "Ministère de la Culture / data.gouv.fr"
        date: "2026-07-21"
        note: "Licence Ouverte 2.0, weekly refresh. The stable path — the POP API is live but undocumented and rate-blocked."
    last_updated: "2026-07-21"

