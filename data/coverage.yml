# Coverage grid — one cell per (definition band x jurisdiction).
#
# `records_held` is GENERATED by scripts/counts.py; everything else is
# hand-maintained and reviewed. An `unexamined` cell is a published
# admission, and `settled_by` names the register that would close it.
version: 1
cells:
- definition: fortified_residence
  jurisdiction: IE
  state: complete
  settled_by:
  - ie-smr
  records_held: 4552
  register_count: 4552
  note: 'CLOSED. All 4,552 records the Archaeological Survey of Ireland holds under MONUMENT_CLASS LIKE
    ''Castle%'' have a record here, imported 2026-07-21 and reproducible from the committed snapshot.


    READ IT NARROWLY. Complete against the SMR''s Castle class — not against the band''s criterion (4,551
    of the 4,552 are assessment: register-derived at confidence: low), and not against any single idea
    of an Irish castle. The same register answers the same question with 129 if you accept only ''Castle
    - Anglo-Norman masonry castle''. Each record keeps the register''s finer class on its register_entry,
    so the strict reading stays recoverable from the data without re-querying the service.


    One record is assessed rather than imported: Trim Castle was hand-authored at founding, and the import
    found its SMR reference had been recorded wrongly. Correcting it removed a duplicate that had pushed
    this cell one over the register total.'
- definition: fortified_residence
  jurisdiction: GB-WLS
  state: complete
  settled_by:
  - gb-wls-cadw
  - gb-wls-coflein
  records_held: 104
  register_count: 104
  note: 'THE FIRST CLOSED CELL. Every one of the 104 scheduled monuments Cadw classes SiteType: Castle
    has a record here, imported from the register on 2026-07-21 and reproducible from the committed snapshot.
    Cadw is the only British register with a real castle-type filter, which is why Wales closed first.


    READ THE CLAIM NARROWLY, because it is narrower than "Wales has 104 castles". It means: complete against
    Cadw''s scheduled-monument castle typology. It does NOT mean complete against the band''s own criterion
    — all 104 verdicts are assessment: register-derived at confidence: low, transcribed from Cadw''s typology
    rather than assessed against this band''s rule, and counts report them separately for exactly that
    reason. Nor does it mean every Welsh castle: scheduling is a protection decision, so unscheduled castles
    are absent by construction, and Coflein — a record of what exists rather than what is protected —
    independently returns 158.


    What closing this cell actually proves is that the pipeline can close a cell, and against exactly
    what. Upgrading the 104 to assessed verdicts is the next real work.'
- definition: fortified_residence
  jurisdiction: GB-ENG
  state: unexamined
  settled_by:
  - gb-nhle
  - gatehouse
  records_held: 0
  register_count: null
  note: 'Blocked, not merely unstarted, and the blocker is worth naming precisely: the National Heritage
    List''s bulk schema has NO TYPE FIELD, so castles cannot be filtered out of 379,680 listed buildings
    and 19,998 scheduled monuments. Keyword matching returns 1,190 and 3,237 respectively and is worthless
    in both directions at once. The Gatehouse Gazetteer is the scholarly alternative but is not openly
    licensed and not bulk-extractable. register_count stays null rather than borrowing a tourism figure.

    '
- definition: fortified_residence
  jurisdiction: GB-SCT
  state: unexamined
  settled_by:
  - gb-sct-trove
  records_held: 0
  register_count: null
  note: 'Blocked. Castle is not a category in the Scottish designation layers — the scheduled-monument
    CLASS field has exactly one distinct value across every record. Keyword matching gives 624 scheduled
    monuments and 2,214 listed buildings. trove.scot is WAF-blocked to automated access, so even the record
    side is unreachable without a manual step.

    '
- definition: fortified_residence
  jurisdiction: GB-NIR
  state: unexamined
  settled_by:
  - gb-nir-nismr
  records_held: 0
  register_count: null
  note: 'register_count is deliberately null even though the register returns a number, because the number
    is 4 and it is wrong. Northern Ireland''s castles are classified as FORTIFICATION (353) and MOTTE
    (48); exactly one record in 18,506 carries the type TOWER HOUSE. Publishing 4 here would be the exact
    error this site exists to document.

    '
- definition: fortified_residence
  jurisdiction: FR
  state: partial
  settled_by:
  - fr-pop
  records_held: 0
  register_count: 6286
  note: 'Closable with a caveat that must travel with the number: 6,286 is one of four defensible tokenisations
    of a free-text denomination field, and the others give 6,159, 6,285 and 5,703. The rule is published
    alongside the count.

    '
- definition: fortified_residence
  jurisdiction: DE-SN
  state: unexamined
  settled_by: []
  records_held: 0
  register_count: null
  note: 'Saxony — the jurisdiction whose coverage gap provoked this project — has no register that can
    settle this cell. The state Denkmalliste classifies by Denkmalart with no fortification category,
    splits archaeology to a separate agency, is licensed CC BY-NC-ND (not open data), and offers no bulk
    download. The circulating figures of 700, 723 and 821 all come from the literature, not a register,
    and count three different things. settled_by is empty because nothing currently could settle it: this
    is a research question, not a work order.

    '
- definition: fortified_residence
  jurisdiction: ES
  state: unexamined
  settled_by: []
  records_held: 0
  register_count: null
  note: 'Uncountable by law rather than by neglect. Spanish castles hold protected status automatically
    under the 1949 decree, so the protected class is open-ended and no enumerated list is derivable even
    in principle. settled_by is empty and will stay empty.

    '
- definition: fortified_residence
  jurisdiction: JP
  state: partial
  settled_by:
  - wikidata
  records_held: 1
  register_count: null
  note: 'Holds one exemplar, carried to test whether the band is Eurocentric in practice. Wikidata gives
    2,266 castle-class items for Japan; no national heritage register has been assessed for enumerability
    here, so register_count stays null.

    '
- definition: fortified_residence
  jurisdiction: SY
  state: partial
  records_held: 1
  register_count: null
  settled_by: []
  note: One exemplar, carried for the military-order boundary case. No register assessed.
- definition: fortified_residence
  jurisdiction: IN
  state: partial
  records_held: 1
  register_count: null
  settled_by: []
  note: 'One exemplar, carried to expose the band''s limits rather than to begin coverage. The European
    lord-versus-state axis does not transfer to Rajput polity, so systematic work here would need a band
    this dataset does not have.

    '
- definition: enclosure_fortification
  jurisdiction: IE
  state: partial
  settled_by:
  - ie-smr
  records_held: 1
  register_count: 31431
  note: 'The largest closable population in the dataset: 31,431 ringfort-class records (rath 26,000, cashel
    3,551, unclassified 1,880). Scholarship puts the number CONSTRUCTED nearer 45,000, the gap being roughly
    37% attrition since the first Ordnance Survey — so this cell can close against the register while
    remaining incomplete against the past.

    '
- definition: enclosure_fortification
  jurisdiction: GB-WLS
  state: unexamined
  settled_by:
  - gb-wls-cadw
  - hillforts-atlas
  records_held: 0
  register_count: 287
  note: Cadw gives 287 scheduled hillforts; the Atlas of Hillforts covers Wales within its 4,147 entries.
- definition: enclosure_fortification
  jurisdiction: GB-ENG
  state: unexamined
  settled_by:
  - hillforts-atlas
  records_held: 0
  register_count: null
  note: 'The Atlas of Hillforts is the bounding register and is enumerable, but its 4,147 entries span
    Britain and Ireland together and have not been split by jurisdiction here. Note the Atlas''s own concession
    that many of its entries "are not on hills and are not really forts" — the band''s criterion and the
    register''s criterion are close but not identical.

    '
- definition: enclosure_fortification
  jurisdiction: NZ
  state: unexamined
  settled_by: []
  records_held: 0
  register_count: null
  note: 'Recorded as an explicit gap rather than left silent. Māori pā are hilltop fortifications built
    in the thousands with timber palisades rather than stone. No record is held and no register has been
    assessed. A dataset that simply had no New Zealand cell would read as though there were nothing to
    find.

    '
- definition: state_fortification
  jurisdiction: FR
  state: partial
  settled_by:
  - gatehouse
  - osm
  records_held: 1
  register_count: null
  note: 'One exemplar from the UNESCO Vauban serial property. No register bounds French state fortification
    as a class; the Vauban inscription covers 12 component groups, which is a selection rather than a
    population.

    '
- definition: state_fortification
  jurisdiction: GH
  state: partial
  settled_by: []
  records_held: 1
  register_count: null
  note: 'One exemplar. The UNESCO inscription covering the Ghanaian coastal forts and castles is a serial
    property rather than a register, and no national enumerable register has been assessed.

    '
- definition: palatial_seat
  jurisdiction: WORLD
  state: partial
  settled_by:
  - osm
  - wikidata
  records_held: 0
  register_count: null
  note: 'Open band — register_count is null by rule, not by omission, because no register enumerates "buildings
    called castle that are not fortified". The best available evidence of scale is distributional rather
    than total: of 28,544 OpenStreetMap objects carrying castle_type, 23.7% are stately, 20.5% manor and
    16.4% palace, against 19.5% defensive.

    '
- definition: revival_folly
  jurisdiction: WORLD
  state: partial
  settled_by: []
  records_held: 0
  register_count: null
  note: 'Open band with no register at all: "folly" is not a designation class anywhere. Individual examples
    are protected as listed buildings, so they are in registers but not extractable as a class. This band
    will never close and the site says so wherever it prints the number.

    '
- definition: popular_castle
  jurisdiction: WORLD
  state: partial
  settled_by:
  - thecastlemap
  - wikidata
  - osm
  records_held: 0
  register_count: null
  note: 'Open by construction, and the band''s whole point. Popular usage has no boundary, so any global
    integer for it is a selection presented as a census. thecastlemap publishes 2,435 here; this dataset
    records that figure as a claim to be assessed rather than a population to be matched.

    '
