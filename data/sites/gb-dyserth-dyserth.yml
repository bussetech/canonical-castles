notes: 'Upgraded to assessed against Cadw full report FL130 (sig-20260722-report-fl130). The report
  is substantial and describes a gatehouse, flanking towers, rock-cut ditches and a domestic range (hall
  and chambers) of a royal castle begun by Henry III in 1241 and destroyed by Llywelyn ap Grufudd in
  1263, supporting fortified_residence: yes (a royal lord is still a lord). The report treats it as
  elite medieval military architecture with domestic practices — a fortified royal residence, not a
  post-1500 state artillery work — so state_fortification is not invoked. Other bands (palatial_seat,
  revival_folly, enclosure_fortification, popular_castle) OMITTED — the report does not speak to them.
  Confidence medium.'
