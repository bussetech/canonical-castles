    assessment: assessed
    basis: 'Assessed from Cadw full report FL130. Active defence: a west-facing gatehouse flanked by
      one round and one polygonal tower, two large polygonal towers facing north, and inner/outer wards
      defined by rock-cut ditches and banks on a towering limestone rock. Residence: a domestic range
      opposite the north towers "presumed to be a hall and chambers". A royal castle established by Henry
      III in 1241 (a royal lord is still a lord). Both halves met, though most of the inner ward was
      later quarried away.'
