definitions_met:
  fortified_residence:
    verdict: 'yes'
    assessment: assessed
    basis: A motte up to 8m high with inner and outer baileys, initially with timber defences
      and later a stone tower on the motte, battered at the base and entered at first-floor
      level with a room on each floor. Lordly throughout — built for Richard fitz Pons and
      inherited by the Cliffords with the lordship of Cantref Selyf. Accommodation and defence
      in the same work, which is the criterion.
  enclosure_fortification:
    verdict: 'no'
    assessment: assessed
    basis: A motte-and-bailey castle of the Norman conquest period with a named lord, not
      an enclosure work standing as the primary monument.
  state_fortification:
    verdict: 'no'
    assessment: assessed
    basis: Built by a Norman marcher lord after the conquest of Brecknock. Crown tenure at
      intervals is inheritance and forfeiture, not a state military commission.
  palatial_seat:
    verdict: 'no'
    assessment: assessed
    basis: Said to be beyond repair by 1521; no phase of palatial rebuilding.
  revival_folly:
    verdict: 'no'
    assessment: assessed
    basis: Genuine late-11th or early-12th-century foundation.
