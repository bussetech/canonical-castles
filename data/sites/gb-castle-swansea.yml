notes: 'Assessed from Cadw''s full designation report (GM012), the visible "New Castle". fortified_residence:
  yes — arrowslits, garderobe tower and curtain wall are active defence, integrated with a residential
  hall/solar block held by lords. revival_folly: no — a medieval castle, later adapted (debtors'' prison),
  not a folly. palatial_seat OMITTED (borderline, deliberately not asserted): the report notes the New
  Castle was built when "Edward I''s pacification of Wales had deprived it of any military importance"
  and describes a "picturesque arcaded parapet" on the residential block — suggestive of decorative
  fortification — but the same block retains functional arrowslits and a garderobe tower, and the towers
  were sold off for economic rather than amenity reasons, so the report does not clearly evidence an
  unfortified palatial phase; left unassessed rather than inflated. popular_castle OMITTED: no visitor/usage
  evidence in the report. Confidence medium: single official report plus register.'
