notes: 'ASSESSED against the band criteria on 2026-07-22 from Cadw''s full designation report
  (MM056). Four bands carry assessed verdicts. enclosure_fortification and state_fortification
  are left unassessed (omitted) — the report identifies a private Marcher lordship held continuously
  by named lords, the tenure that places the monument under fortified_residence rather than
  under a lord-less enclosure or a state work, and the report argues neither band affirmatively
  (the Civil War slighting does not make a seigneurial castle a state installation). Descriptive
  fields are carried forward unchanged from the imported record; only the verdicts and confidence
  are the gnome''s work. See docs/decisions/0002.'
