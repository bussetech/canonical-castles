definitions_met:
  fortified_residence:
    verdict: 'yes'
    assessment: assessed
    basis: 'Both halves of the criterion are met by the report. Private lordly residence:
      described as "an important medieval baronial castle" and the caput of the Abergavenny
      Marcher lordship, held successively by the de Braose, Hastings and Beauchamp lords,
      with a great hall, high-status solar apartments and a chamber fit for the constable.
      Active defence: a curtain wall standing "almost to parapet height" with surviving wall-walk
      flagging, a gatehouse "extended outwards into the ditch" with a rebate for a drawbridge,
      and conjoined solar towers with spur buttresses, mural passages and arrow-lit loops.
      Fortification and lordly residence coincide throughout the medieval life of the structure.'
  popular_castle:
    verdict: 'yes'
    assessment: assessed
    basis: 'Assessed on usage, not the register''s name. The report records real public standing:
      a museum/visitor operation now occupies the embattled 1818 building on the motte, the
      site is discussed "in some guidebooks", and the castle "forms a prominent landmark in
      modern Abergavenny" sharing group value with the priory, church and town-wall remains
      — evidence a general audience knows and visits it as a castle.'
