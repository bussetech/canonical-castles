notes: Carried as the reductio for the whole exercise. If a dataset's castle test admits a
  freestanding wall with nothing behind it, the test is doing no work; if it excludes a structure
  that everyone calls Sham Castle and visits as one, the dataset has left usage behind. The
  band model records both without resolving them. Note the distinction Philip Davis draws
  and most datasets collapse - a symbolic castle built to assert status is not the same as
  a sham castle built as scenery, and this record is the second kind.
