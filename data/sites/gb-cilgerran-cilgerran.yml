notes: 'Assessed from Cadw''s full designation report (PE002). fortified_residence: yes — two round
  towers with arrow slits, a gatehouse with portcullis and draw-bar holes, curtain wall with wall-walk
  and a promontory-cutting ditch are active defence, integrated with hall, private apartments and kitchen
  held by identified lords. revival_folly: no — a defensive-era castle, refortified in the 1370s. popular_castle:
  yes — the report explicitly documents long-standing tourist visitation from the 18th century. palatial_seat
  OMITTED: the Vaughans built a new house nearby and let the castle fall to ruin rather than converting
  it into an unfortified seat, so no palatial phase of the castle itself is evidenced. Confidence medium:
  single official report plus register. (The fragment scheduling PE384 is a separate record, gb-cilgerran-cilgerran-additional-area.)'
