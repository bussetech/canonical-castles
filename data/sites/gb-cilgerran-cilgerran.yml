definitions_met:
  fortified_residence:
    verdict: 'yes'
    assessment: assessed
    basis: 'Cadw''s report describes two strong round towers projecting beyond the curtain wall with
      arrow slits, a main gatehouse with portcullis grooves and draw-bar holes (a gate meant to be held),
      a curtain wall with wall-walk and a defensive ditch cutting off the promontory — active defence.
      Residence with hall, private apartments and kitchen, held by Earl William Marshal of Pembroke
      and later the Hastings and Vaughan families.'
  revival_folly:
    verdict: 'no'
    assessment: assessed
    basis: A 12th-13th-century masonry castle of the defensive era, refortified in the 1370s against
      a feared French invasion; a genuine castle later left as a picturesque ruin, not a purpose-built
      revival or sham.
  popular_castle:
    verdict: 'yes'
    assessment: assessed
    basis: The report records that the ruin's "picturesque setting made it an early favourite among tourists,
      who from the 18th century, could visit by boat from Cardigan" — documented long-standing popular
      visitor appeal, not merely a register name.
