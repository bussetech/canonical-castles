definitions_met:
  fortified_residence:
    verdict: 'yes'
    assessment: assessed
    basis: 'Meets both halves of the criterion on the designation evidence. Active defence:
      a curtain wall still standing to c.1.9m, round towers of c.6m diameter at each corner,
      a ditch on three sides, and an entrance broken by a causeway across it. Lordly residence:
      slight traces of internal buildings, and Walter Hakelutel received a LICENCE TO CRENELLATE
      by 1285 — the documentary class Coulson reads as a royal acknowledgement of private
      seigneurial status rather than a military permission, which is precisely what this band
      means by a lord''s fortified residence.'
  enclosure_fortification:
    verdict: 'no'
    assessment: assessed
    basis: The primary work is a masonry castle with an identified lord, not an enclosure
      whose bank or wall is itself the monument. The band explicitly routes any site with
      an identified lordly residence to fortified_residence instead.
  state_fortification:
    verdict: 'no'
    assessment: assessed
    basis: Seigneurial, not state. Built by or for Walter Hakelutel in the wake of Llywelyn
      ap Gruffudd's defeat; a licence to crenellate is the crown acknowledging a private work,
      not commissioning or garrisoning one.
  palatial_seat:
    verdict: 'no'
    assessment: assessed
    basis: No palatial phase at any point. The castle is not recorded beyond the 14th century
      and the masonry was already crumbling; nothing was rebuilt here as a residence of display.
  revival_folly:
    verdict: 'no'
    assessment: assessed
    basis: Genuine late-13th-century defensive fabric, securely dated to c.1284-5. Nothing
      here was built in castle form after the defensive era for effect.
