definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw's report describes a rectangular Norman keep (18×13m, very thick
      walls) and a curtain wall enclosing the site, with a main entrance archway
      retaining a draw-bar hole and a narrow pointed-arch postern, and a great
      hall and buildings lining the walls — a defensible residence that 'still
      has the appearance of a defensive stronghold' on a naturally strong ridge.
      It was the centre of the lordship of Dinas Powys, held by the Norman de
      Sumeri family (Roger de Sumeri). Both halves of the criterion are met.
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >-
      A castle of c.1200 held by the Norman de Sumeri lords, with genuine
      medieval defensive fabric — not a post-defensive-era castellated building
      or sham; fails the revival criterion.
