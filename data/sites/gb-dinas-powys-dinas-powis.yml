notes: >-
  Assessed from Cadw's full report (GM021), replacing the register-derived
  verdict with an assessed fortified_residence: yes and adding revival_folly: no.
  The curtain wall is straight-sectioned without corner towers, but the Norman
  keep, curtain-bounded enclosure, gated entrance with draw-bar hole and postern
  give active defence, and the great hall plus the de Sumeri lordship supply the
  private-residence half. popular_castle left UNASSESSED — the report shows no
  visitor operation or usage evidence. palatial_seat, state_fortification and
  enclosure_fortification omitted — the report does not speak to them. Confidence
  medium: one official report plus the register.
