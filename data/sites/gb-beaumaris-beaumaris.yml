notes: >-
  Assessed 2026-07-22 against Cadw scheduled-monument full report AN001
  (sig-20260722-report-an001). fortified_residence and popular_castle set to
  assessed yes. state_fortification was considered — the report frames Beaumaris as
  a royal stronghold completing a "chain of fortifications" to control conquered
  Gwynedd — but that band is aimed at post-1500 state/artillery works, and the
  report also affirms domestic residence in the inner ward; per the band's explicit
  inclusion of royal residences, it is treated as a fortified royal residence, and
  state_fortification is OMITTED rather than set. palatial, revival and enclosure
  bands OMITTED. Confidence medium: a single official report (however detailed) is
  not high on one source.
