definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw report AN001 describes a concentric castle of Edward I with four rings
      of defences, gatehouses north and south built to be held, corner and
      buttressing towers giving flanking fire, and a water-filled moat with a dock.
      Domestic buildings stood within the inner ward (since removed), evidencing the
      residence of the royal builder; a royal lord is still a lord under this band.
  popular_castle:
    verdict: "yes"
    assessment: assessed
    basis: >-
      The report records the monument's designation as a UNESCO World Heritage Site
      and its "national and international importance" — a major, universally
      recognised monument a general audience would unhesitatingly call a castle.
      This is usage evidence (WHS citation), not merely the register's naming.
