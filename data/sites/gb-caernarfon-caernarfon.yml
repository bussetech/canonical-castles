notes: >-
  Upgraded from bulk register import to assessed verdicts against the Cadw full
  report. fortified_residence, popular_castle and revival_folly are now assessed
  from the report's evidence. enclosure_fortification, state_fortification and
  palatial_seat are OMITTED: the report describes a genuine, governing defensive
  fabric (so not palatial_seat) and neither a prehistoric enclosure nor a
  post-1500 state work. Though crown-built, the report frames it as a royal
  residence and seat of government (Eagle Tower, royal apartments), which the
  fortified_residence band explicitly admits — so it is not routed to
  state_fortification. Confidence medium: one official report corroborated only
  by the register.
