definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Royal lordly residence and active fortress. The Eagle Tower was "probably
      at first intended to accommodate the King's lieutenant" and the castle held
      royal apartments, while the twin-towered King's Gate, the mural towers and
      the curtain walls formed "a complete and defensible enclosure" that
      withstood Glyn Dŵr's sieges of 1403-04 and Civil War sieges. A royal lord
      is still a lord; both halves of the criterion are met.
  popular_castle:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Designated a World Heritage Site. Cadw records that its "sheer scale,
      nobility and architectural finish set it apart from all the others" — a
      monument of national and international standing that any general audience
      unquestionably calls a castle.
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >-
      Begun 1283 by Edward I and built in two medieval phases (1283-1292,
      1294-1330), a genuine Edwardian fortress squarely within the defensive
      era; not a post-defensive sham or aesthetic construction.
