notes: >-
  Assessed 2026-07-22 from Cadw's full scheduled-monument report
  (sig-20260722-report-br126). fortified_residence upgraded to assessed on the
  D-shaped tower, walling, probable range and lordly (Llywelyn ab Gruffudd)
  construction. Two WWII pillboxes were built on the castle site using masonry
  to mimic the castle walling; those are distinct 20th-century state works, not
  this medieval structure, so no state_fortification verdict is set on this
  record. All other bands omitted — the report does not speak to popular usage,
  palatial conversion, or revival.
