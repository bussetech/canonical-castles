definitions_met:
  fortified_residence:
    verdict: "contested"
    assessment: assessed
    basis: "The report cuts both ways. It describes a lordly castle with a private appartment, a chapel and a hall and heavy active defence (a twin round-towered gatehouse with portcullis and drawbridge, mural round towers, arrowslits and an exceptionally deep, steep-sided moat) — yet states that 'the sole purpose of White Castle was military', that it was garrisoned by troops and was austere and functional, so the private-residence half is argued against by the designation itself."
disputed: true
dispute_note: >
  One reading takes White Castle as a fortified lordly residence — a Marcher
  castle (William Fitz Osbern, later the crown under Lord Edward) with a private
  appartment, a chapel and a hall. The other follows Cadw's own statement that
  'the sole purpose of White Castle was military', a garrisoned, austere and
  functional work whose residential provision was minimal (the hall only in
  timber, a single private appartment), pulling it away from the residence half.
