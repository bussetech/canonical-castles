notes: >
  Upgraded to an assessed record from Cadw's full report (MM006).
  fortified_residence assessed 'contested' because the report simultaneously
  documents residential fabric (private appartment, chapel, hall) and declares a
  sole military purpose. state_fortification left unassessed — that band is for
  gunpowder-age state works, whereas the original purpose here was a medieval
  Marcher/crown lordship castle; its earth-and-timber origins are part of that
  lordly castle, not a separate enclosure_fortification.
