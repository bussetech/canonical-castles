disputed: true
dispute_note: Cadw states plainly that Raglan was built 'not as a defensive structure, but
  as a fortress-palace' whose Great Tower mimicked earlier keeps as a status symbol — while
  describing fabric (Great Tower, gatehouse, closet tower) that reads as defensive. The structure
  sits on the fault line between the militarist and revisionist readings of what a castle
  is, and this dataset records that rather than picking a side.
