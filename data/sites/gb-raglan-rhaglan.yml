definitions_met:
  fortified_residence:
    verdict: contested
    assessment: assessed
    basis: 'The designation text argues both sides of this band in consecutive sentences,
      which is why it is contested rather than decided. Against: Cadw states Raglan was built
      ''not as a defensive structure, but as a fortress-palace'', and that the Great Tower
      MIMICKED the keeps of earlier castles as ''the ultimate status symbol''. For: the fabric
      includes a Great Tower, a gatehouse, a closet tower and a walled court, and a 15th-century
      magnate''s seat was defensible in fact whatever the intent. This is exactly the militarist/revisionist
      dispute the band''s own authorities are divided on — Coulson would read the display
      as the point, and the fabric as the vocabulary of rank rather than of war.'
  palatial_seat:
    verdict: 'yes'
    assessment: assessed
    basis: Cadw's own term is 'fortress-palace'. Sir William ap Thomas bought the manor of
      Raglan in 1432, demolished the existing manor house, and built to impress — high-quality
      ashlar, some of the earliest brickwork in Wales, a building programme continued by a
      son described as enormously wealthy. A high-status residence bearing a castle-word whose
      fortification is governed by display.
  revival_folly:
    verdict: 'no'
    assessment: assessed
    basis: Built in the 1430s-40s, within the defensive era, and genuinely inhabited as a
      lordly seat. The mimicry of earlier keeps makes it what Philip Davis calls a SYMBOLIC
      castle, which he is explicit is not the same thing as a sham castle — this band holds
      the latter.
  state_fortification:
    verdict: 'no'
    assessment: assessed
    basis: 'Private throughout: built by Sir William ap Thomas and continued by Sir William
      Herbert. Not a crown commission and not a garrison work.'
  enclosure_fortification:
    verdict: 'no'
    assessment: assessed
    basis: A designed courtyard castle of the 15th century, not a prehistoric or early-medieval
      enclosure work.
  popular_castle:
    verdict: 'yes'
    assessment: assessed
    basis: Named Castell Rhaglan / Raglan Castle by the national heritage body that designates
      it, and operated and signposted as a castle. General usage is not in any doubt here.
