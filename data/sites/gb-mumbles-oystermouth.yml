    basis: >-
      Cadw report GM007 describes a keep, a gatehouse and curtain walls built
      1256-66 for active defence, and states William de Braose regarded it as
      his most impressive residence (Edward I lodged there in 1284), with a hall
      block and a chapel added — a defensible work that was the private seat of a
      lord meets both halves of the band.
