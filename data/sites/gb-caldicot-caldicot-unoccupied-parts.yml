definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      A motte-and-bailey founded in the 12th century by Milo Fitzwalter, Lord of
      Caldicot, and refortified in stone from c.1221 by Humphrey de Bohun. Active
      defence: a keep with 3m walls, cross arrow loops, a crenellated parapet and
      hourd; a curtain wall with a full wall-walk; and the de Bohun and Woodstock
      gatehouses with portcullises and murder holes meant to be held. Residence:
      grand lordly accommodation in the SE tower and hall range, and a gatehouse
      built as "accommodation for the Lord and his family" — both halves met, for
      identified lords.
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >-
      A 12th-14th-century castle within the defensive era; the 1885-1963 Cobb
      restoration into a family home was restoration of a genuine castle, not a
      post-defensive sham — the original defensive intent governs.
