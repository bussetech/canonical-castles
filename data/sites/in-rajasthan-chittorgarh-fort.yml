notes: The most important record in the seed set for what it exposes. The Arthashastra classifies
  forts by TERRAIN - hill, water, desert, forest, earth, and defended-by-men - which is a
  complete, ancient and internally coherent classificatory scheme organised on an axis entirely
  orthogonal to the European one of tenure. This dataset's bands are a European instrument,
  and applying them here produces two contested verdicts rather than knowledge. That is recorded
  as a limitation of the bands, not of Chittorgarh.
