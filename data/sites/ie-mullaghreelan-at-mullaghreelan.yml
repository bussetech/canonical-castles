    basis: 'CONTESTED between two registers. The Archaeological Survey of Ireland classes
      this Castle - ringwork, which maps to this band. Wikidata (Q24196386), joined on the
      SMR identifier, classes it ringfort, which maps to enclosure_fortification. The disagreement
      is about what kind of thing it is: a ringwork on a site that may equally be read as
      an earlier ringfort — the two are hard to separate on the ground and Irish archaeology
      disputes exactly this boundary. Recorded as contested rather than resolved to whichever
      register was imported first.'
