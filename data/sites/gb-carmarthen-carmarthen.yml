definitions_met:
  fortified_residence:
    verdict: 'yes'
    assessment: assessed
    basis: 'Cadw''s report describes a stone-revetted motte, a twin-towered gatehouse (a gate meant to
      be held), a south-west corner tower, a wall turret and sections of curtain wall with half-round
      turrets — active defensive features. A castle that passed to the Crown and became the administrative
      centre of south-west Wales, held by lords including William Marshall the younger, earl of Pembroke.'
  revival_folly:
    verdict: 'no'
    assessment: assessed
    basis: A 12th-14th-century masonry castle of the defensive era; although much visible fabric is 19th-century
      reconstruction, it reconstructs the real castle on its own site rather than being a purpose-built
      sham or folly.
