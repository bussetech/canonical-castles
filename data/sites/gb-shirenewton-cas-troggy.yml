definitions_met:
  fortified_residence:
    verdict: contested
    assessment: assessed
    basis: >
      The report cuts both ways under this band's active-defence test. It describes
      massive polygonal corner towers, an ashlar curtain wall with a battered base
      and flanking angle towers (genuine defensible work), yet judges the site
      "effectively a fortified hunting lodge" whose "massive corner towers and
      curtain walls contrast with significant weaknesses presented by the lack of
      serious defences for the remainder of the site, the huge latrine outlet to the
      eastern tower and large hall windows", with "no signs of a gatehouse".
  palatial_seat:
    verdict: "yes"
    assessment: assessed
    basis: >
      Cadw groups Cas Troggy with "palatial high status castle buildings...
      deliberately designed as statements of rank, wealth and lordship" providing
      "lavish, often occasional accommodation", and calls it "effectively a fortified
      hunting lodge" serving Roger Bigod's seat at Chepstow — a status residence
      whose military features are trappings rather than governing defences.
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >
      Begun for Roger Bigod III by 1303, squarely within the defensive era — its
      military architecture is a symbolic statement of rank, not a post-defensive
      sham or picturesque folly. A symbolic castle is not a sham one.
disputed: true
dispute_note: >
  On the fortified_residence band the report argues both readings. It records real
  defensive fabric — massive polygonal corner towers, an ashlar curtain wall with a
  battered base and flanking angle towers — while judging the site "effectively a
  fortified hunting lodge" with a "lack of serious defences for the remainder of the
  site", large hall windows and a monumental latrine outlet undermining
  defensibility, and "no signs of a gatehouse". The defensive reading and the
  status-hunting-seat reading genuinely conflict.
