notes: >
  Assessed against Cadw's full report (MM015), which mirrors the Raglan pattern —
  military fabric present but explicitly subordinated to status and comfort.
  fortified_residence is contested (defensive fabric vs. Cadw's "fortified hunting
  lodge" reading), palatial_seat is yes, revival_folly is no (within the defensive
  era). popular_castle is OMITTED — this is an obscure abandoned ruin with no visitor
  operation or public standing shown in the report. Single Cadw source, confidence
