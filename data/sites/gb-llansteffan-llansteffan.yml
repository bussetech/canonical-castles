definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: "A square gatehouse defended by portcullis and doors, a later double-towered gatehouse (modelled on Caerphilly's East Gate) with front and rear portcullises, five murder holes and outer machicolations, wall-walks carried on vaults and D-shaped mural towers provide active defence; the North Tower and the gatehouse's well-appointed great rooms with fireplaces served as the lord's private accommodation — both halves met."
  enclosure_fortification:
    verdict: "yes"
    assessment: assessed
    basis: "The promontory neck was first defended in the 6th century BC when a double bank and ditch were thrown across it to form a promontory fort — a prehistoric defensive enclosure with no identified lordly residence — satisfying this band for that earliest phase."
