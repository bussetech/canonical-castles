notes: >
  Upgraded to an assessed record from Cadw's full report (CM004). Two bands
  carry verdicts for two phases: enclosure_fortification 'yes' for the Iron Age
  promontory fort, fortified_residence 'yes' for the medieval castle. The Tudor
  conversion 'from a military structure into a comfortable residence' was weighed
  for palatial_seat but left unassessed — the castle retained heavy defences and
  the change was a blocked gatehouse, not a palatial rebuild. popular_castle left
  unassessed (taken into state care in 1959, but the report gives no
  visitor-operation or tourism evidence).
