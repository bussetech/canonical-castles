notes: >
  fortified_residence upgraded to assessed against Cadw's detailed report (MM012),
  which documents held active defence (round flanking towers, portcullis, Garrison
  Tower with fighting gallery, recorded garrison, a resisted siege) and lordly
  residence. state_fortification is OMITTED, not applied — the castle was periodically
  in royal hands but its original and governing purpose was seigneurial, so the
  lordly reading governs. Later domestic apartments were added alongside, not in place
  of, the defences, so palatial_seat is not triggered. Single Cadw source, confidence
  medium.
