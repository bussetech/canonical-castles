definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >
      A Marcher lord's castle (de Clares, then William Marshal, then the Earls of
      March) with emphatic active defence — a curtain wall with round flanking towers,
      a portcullis gateway, and the Garrison Tower with battlements, cruciform
      arrowslits and beam holes for a fighting gallery — held by a recorded garrison
      of archers and sergeants and withstanding Henry III's siege of 1233, combined
      with a keep, hall block and high-status apartments as the lordly residence.
