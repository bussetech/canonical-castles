notes: 'Upgraded from register-derived to assessed against Cadw full report CN040 (sig-20260722-report-cn040).
  The report is substantial and describes genuine defensive fabric plus documented royal Welsh occupation,
  supporting fortified_residence: yes. revival_folly assessed no because the 19th-century Willoughby
  restoration restored real medieval fabric rather than building a sham. Other bands (enclosure_fortification,
  state_fortification, palatial_seat, popular_castle) are OMITTED: the report does not speak to them
  — in particular it evidences state guardianship (from 1930) but not a visitor operation or public
  standing, and per the usage rule popular_castle needs more than managed-monument status. Confidence
  medium: one official report plus the register.'
