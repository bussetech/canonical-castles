definitions_met:
  fortified_residence:
    verdict: 'yes'
    assessment: assessed
    basis: 'Assessed from Cadw full report CN040. Active defence: two towers linked by a 13th-century
      curtain wall (4ft 6in–5ft 6in thick) with a wall-walk and a surviving arrowslit loop, rock-cut
      ditches to E and W, a keep entered on the first floor via a fore-building with a drawbridge pit,
      a main NE gateway and a defended postern. Residence: keep and NW tower with fireplaces, window
      seats and latrines. The castle was the royal residence of Llywelyn ap Gruffydd — a royal/princely
      lord is still a lord. Both halves met.'
  revival_folly:
    verdict: 'no'
    assessment: assessed
    basis: 'A genuine 12th–13th-century native Welsh fortress. The well-preserved keep owes its state
      to late-15th-century re-occupation and 19th-century restoration by Lord Willoughby de Eresby —
      restoration of real medieval defensive fabric, not a post-defensive sham built in castle form.'
