notes: >-
  Upgraded from the bulk register import: the full Cadw scheduled-monument
  report (CD032) was read and the bands assessed against its own evidence.
  fortified_residence is now assessed: yes — the report describes both active
  enclosure defence (rampart, ditch, scarps) and a residential keep providing
  accommodation. revival_folly is assessed: no — a documented 12th-century
  defensive work (built c.1110, destroyed 1137, besieged and rebuilt), not a
  post-defensive-era castle in form only. enclosure_fortification is OMITTED:
  the report frames this as a lordly castle with a residential keep, not a
  lord-less defended enclosure, so this band's scenario is not spoken to.
  state_fortification and palatial_seat are OMITTED: the report describes a
  medieval lordly stronghold, nothing about state/municipal tenure or an
  unfortified palatial seat. popular_castle is OMITTED: the report shows an
  obscure well-preserved earthwork/ruin with no visitor operation or public
  standing, and a register name is not usage evidence. Confidence medium: one
  official report plus the register, no independent corroboration.
