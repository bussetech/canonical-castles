definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw's report describes a defended residence bounded by active
      defences — a rampart and ditch on the north where it faces level
      ground, and scarps above steep natural slopes elsewhere — with a
      massive rectangular stone tower (18-20m) forming part of a building
      complex, the keep "served mainly to provide accommodation" (the
      residence half). Established about 1110, disputed, besieged and
      rebuilt through the later 12th century: a lordly stronghold held and
      contested, satisfying both the defensible and residential halves.
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >-
      A genuine defensive-era work, not a castle built in castle form for
      effect — established about 1110, destroyed in 1137, then rebuilt and
      besieged through the later 12th century and last recorded in 1208.
      Real ramparts, ditch and stone tower with a documented military
      history place it firmly within the defensive era, so no sham or
      revival intent applies.
