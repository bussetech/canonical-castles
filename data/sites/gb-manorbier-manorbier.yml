notes: >-
  Assessed 2026-07-22 from Cadw's full scheduled-monument report
  (sig-20260722-report-pe004). fortified_residence upgraded to assessed:
  substantial retained defences plus documented de Barri residence. palatial_seat
  omitted — the "peaceful history" and later habitable-use restoration do not
  amount to defences removed for amenity; the castle's defensive fabric still
  governs. Civil War garrisoning does not make it a state_fortification (original
  seigneurial purpose governs). popular_castle omitted — the report evidences
  historical fame via Giraldus Cambrensis but no visitor operation or usage
  standing, and a name is not proof of popular usage. revival and enclosure bands
  omitted as unspoken.
