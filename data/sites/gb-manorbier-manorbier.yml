    verdict: "yes"
    assessment: assessed
    basis: >-
      Both halves met — an inner ward curtain wall with an east gatehouse and
      flanking north tower, round tower, spur tower and turret, an outer ward
      behind a defensive ditch with wing walls, refortified for the Civil War;
      and the residence of the de Barri family (lords), with hall block,
      kitchens and chapel abutting the curtain.
