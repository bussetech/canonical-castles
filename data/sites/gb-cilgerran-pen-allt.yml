notes: 'Assessed against the Cadw full report (PE169). fortified_residence set to yes: the motte-and-bailey
  form — a motte with a masonry tower and a bailey defended by rock-cut ditch, 7m bank, counterscarp
  and multivallate defences — meets both halves of the criterion. The report notes the castle overlies
  an earlier Iron Age promontory fort (with a possible roundhouse), but describes no fabric of that
  prehistoric phase in its own terms, so enclosure_fortification is left unassessed rather than guessed.
  No usage evidence for popular_castle and nothing for the other bands, so they are omitted. Confidence
  medium: one official report plus the register.'
