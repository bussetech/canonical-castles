notes: >-
  Upgraded from bulk register import to assessed verdicts. fortified_residence
  and revival_folly assessed from the report's keep-and-four-towers description
  and "defensive and domestic practices". The report notes the castle "may not
  have been completed" and identifies no specific lord, but the keep, towers and
  domestic function support the fortified_residence criterion. popular_castle is
  OMITTED — an obscure ridge-top ruin with no visitor operation or public-standing
  evidence in the report; asserting it would inflate the one band with no register
  to check it. enclosure_fortification (this is a masonry keep-and-tower castle,
  not a prehistoric enclosure) and state_fortification omitted. Confidence medium.
