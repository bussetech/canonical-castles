notes: >-
  Designation report (FL016) assessed. fortified_residence: yes — the report
  quotes its own castle definition and describes a shell keep for accommodation, a
  curtain wall around the bailey and a hall with an elaborate barbican, built on an
  earlier motte-and-bailey by Hugh, Earl of Chester. Other bands omitted: no
  popular-usage evidence, no palatial conversion (partially demolished c.1660), no
  post-defensive-era construction. This record is the medieval ruin (FL016), not
  the neighbouring 18th-century Gothic house. One report plus register → medium.
