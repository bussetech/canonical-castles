    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw report MG022 records an inner ward built in stone from the outset "to
      house the king and his immediate household", with a twin-towered inner
      gatehouse (great chamber, private rooms, chapel) flanked by
      three-quarter-round towers and defended by a portcullis and two pairs of
      heavy doors, plus a stone outer gatehouse and curtain of 1251-53 — active
      defence meant to be held combined with a royal lordly residence satisfies
      both halves of the band.
