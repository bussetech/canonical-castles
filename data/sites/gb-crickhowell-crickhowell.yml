definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw's report describes a 12th-century motte (60m diameter, 8m high) and
      bailey rebuilt in stone in 1272, with a shell keep on the motte, a
      defensive wall carrying two D-shaped flanking towers, a bailey curtain
      wall with round towers and a crenellated conjoined double tower — active
      defence with flanking fire and parapets. Built and held by the Turberville
      family, then rebuilt by Sir Grimbald Pauncefote and refortified by Sir
      John Pauncefote (named lords) before Glyndŵr left it in ruins. Both halves
      of the criterion are met.
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >-
      A 12th-century timber motte-and-bailey rebuilt in stone in 1272 and
      refortified under royal command in the 14th century, ruined in the Glyndŵr
      rising — a genuine medieval defensive castle of the defensive era, not a
      post-defensive-era folly.
