  date: '2026-07-21'
  note: '"This dataset is bad. The North Carolina state capitol is a castle?"'
notes: 'Carried as a deliberate all-no record, which this dataset treats as a real finding
  rather than an empty one. It appears in thecastlemap and was named in the originating thread
  as evidence the dataset was broken. A structure scoring no on every band is exactly what
  a false positive looks like when it is written down, and being able to record one is a feature
  of the band model: a dataset with a single castle flag can only include or omit, never assess
  and reject with reasons.'
