definitions_met:
  fortified_residence:
    verdict: 'no'
    basis: A hunting lodge rebuilt as a baroque palace on an artificial island. The water
      setting is ornamental rather than defensive - no wall walks, no parapets, no flanking
      fire - so it fails the active-defence test even though it is surrounded by water.
  palatial_seat:
    verdict: 'yes'
    basis: 'The paradigm Schloss: an early-modern unfortified lordly residence bearing a castle-word,
      rebuilt 1723-1736 for Augustus the Strong as a baroque hunting palace.'
  popular_castle:
    verdict: 'yes'
    basis: Marketed and signposted as Schloss Moritzburg and routinely rendered 'Moritzburg
      Castle' in English-language tourism copy.
  revival_folly:
    verdict: 'no'
    basis: Not a post-defensive-era build in castle form for effect; it is a genuine early-modern
      residence in baroque idiom, which is a different thing.
  enclosure_fortification:
    verdict: 'no'
    basis: No defensive enclosure of any period on the site.
  state_fortification:
    verdict: 'no'
    basis: A private electoral residence, never a state military installation.
