notes: 'In Saxony, the region whose 700-against-9 coverage gap provoked the originating thread.
  Moritzburg is the clean case for why that gap is definitional as well as numerical: it is
  unambiguously a Schloss and unambiguously not a Burg, and a dataset with one castle field
  has to lie about one of those.'
