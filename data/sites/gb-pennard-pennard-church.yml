notes: 'Assessed from Cadw''s full scheduled-monument report (GM044), which replaces
  the register-derived verdict. Only fortified_residence is assessed: the report gives
  a curtain wall, a gatehouse copying Caerphilly, and lordly tenure (lords of Gower).
  enclosure_fortification is OMITTED — the 12th-c ringwork phase is excluded from that
  band because the site has an identified lordly residence. palatial_seat, state_fortification,
  revival_folly and popular_castle are OMITTED: the report speaks to none of them, and
  it gives no usage evidence for popular standing. Confidence medium: one official
  report plus the register. The bundled church is a separate structure on the site,
  not assessed against the castle bands.'
