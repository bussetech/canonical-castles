definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      A motte-and-bailey castle — a sub-rectangular mound divided by a broad
      ditch and girdled by a deep V-shaped ditch, with drystone structures on
      top — raised during the late-13th-century border dispute between the lords
      William de Breos and Rhys Fychan; the report notes only temporary
      occupation, but the form and lordly context are those of a private
      fortified work.
