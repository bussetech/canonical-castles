    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw report GM063 records a courtyard castle, roughly circular, with a
      full-height battered curtain wall and two square mural towers, held by
      identified lords — Robert Fitzhamon, a royal phase under Henry II, then from
      1217 the Turbeville Lords of Coity. Buildings stood within the ward and the
      south tower was adapted for domestic use, evidencing lordly residence
      coinciding with active defence.
