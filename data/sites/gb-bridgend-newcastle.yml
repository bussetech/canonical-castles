notes: >-
  Assessed 2026-07-22 against Cadw scheduled-monument full report GM063
  (sig-20260722-report-gm063); fortified_residence upgraded to assessed.
  palatial_seat was considered on the late-16th-century domestic refurbishment of
  the south tower (Tudor windows and fireplaces) but NOT set: the report describes
  the castle as "virtually untouched since the late 12th century" with no
  defensive fabric removed for amenity, so a modest refit does not evidence a
  palatial phase. popular, revival, enclosure and state bands OMITTED — the report
  does not speak to them. Confidence medium: single official report plus register.
