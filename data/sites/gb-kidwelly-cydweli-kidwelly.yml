definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: "Cadw CM002 describes a concentric castle held by identified lords (Bishop Roger of Salisbury, the de Chaworths, Henry earl of Lancaster, Sir Rhys ap Thomas) with a square inner ward of four round flanking towers, portcullis gates, an outer curtain of mural towers and a Great Gatehouse fitted with murder holes and machicolations, enclosing halls and lordly accommodation — active defence and lordly residence together."
  popular_castle:
    verdict: "yes"
    assessment: assessed
    basis: "The report records the castle taken into State care in 1927 and maintained as a major operated monument — a well-preserved concentric castle of recognised public standing that a general audience would call a castle."
