definitions_met:
  fortified_residence:
    verdict: 'yes'
    assessment: assessed
    basis: 'A substantial ringwork with a circular enclosure and a stone keep on its summit,
      held by the de Braose lords — an identified lordly residence, which is what routes a
      ringwork into this band rather than the enclosure one. Defensibility is documented in
      use, not merely in form: captured and burnt by King John in 1216, rebuilt by Henry III,
      and recorded as defensible against the Welsh in 1403.'
  palatial_seat:
    verdict: 'yes'
    assessment: assessed
    basis: A later and separate phase. In the 1660s large sections of the medieval apartments
      were demolished to make way for a new mansion, and the curtain wall was progressively
      taken down partly to improve the views from it. Defence was dismantled in favour of
      amenity.
  enclosure_fortification:
    verdict: 'no'
    assessment: assessed
    basis: The ringwork has an identified lordly residence and a stone keep, which the band's
      own criterion routes to fortified_residence.
  state_fortification:
    verdict: 'no'
    assessment: assessed
    basis: Seigneurial and dynastic — de Braose, Lancaster, Stafford, Buckingham. Crown involvement
      is as captor and restorer, not as commissioning power.
  revival_folly:
    verdict: 'no'
    assessment: assessed
    basis: Genuine medieval fabric with a genuine post-medieval mansion; neither is castle-form
      built for effect.
  popular_castle:
    verdict: 'yes'
    assessment: assessed
    basis: Named and open as Hay Castle, a well-known visitor attraction in Hay-on-Wye.
