notes: The type case for this entire dataset. Neuschwanstein fails every scholarly definition
  of a castle and is simultaneously the most famous castle in the world. Any dataset forced
  to answer yes or no about it will be wrong in one direction or the other; the band model
  simply records both facts and stops arguing.
