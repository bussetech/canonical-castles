definitions_met:
  fortified_residence:
    verdict: 'no'
    basis: Built 1869-1886 as a romantic retreat for Ludwig II with no defensive intent at
      any stage. It has no wall walks, no flanking fire and no gatehouse meant to be held;
      the castle form is a stage set. Fails the defensibility half of the criterion outright,
      and the private-lordly-residence half is met only trivially.
  palatial_seat:
    verdict: 'yes'
    basis: A high-status unfortified royal residence bearing a castle-word (Schloss). UNESCO
      inscribed it in 2025 within 'The Palaces of King Ludwig II of Bavaria', using the palace
      frame; German and English official communications for the identical property use 'castles'
      and 'palaces' interchangeably.
  revival_folly:
    verdict: 'yes'
    basis: Built after the defensive era in castle form - towers, curtain-wall silhouette,
      battlements - for aesthetic and symbolic purposes, with no defensive intent at any point.
      A textbook nineteenth-century romantic revival.
  popular_castle:
    verdict: 'yes'
    basis: Very probably the most photographed 'castle' on Earth, universally signposted,
      marketed and described as one by its own operator and by German national tourism.
  enclosure_fortification:
    verdict: 'no'
    basis: No defensive enclosure; the site is a rock spur built over for picturesque effect.
  state_fortification:
    verdict: 'no'
    basis: Never a military installation. Commissioned privately by Ludwig II from his own
      funds, not by the Bavarian state as a work of defence.
