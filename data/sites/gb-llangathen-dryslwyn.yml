    basis: 'CONTESTED between two registers. Cadw schedules this as SiteType: Castle, which
      maps to this band. Wikidata classes the same monument (joined on Cadw Monument ID) as
      a contour fort, which maps to enclosure_fortification instead. The registers disagree
      about what kind of thing it is, not about the evidence: Dryslwyn Castle — a native Welsh
      castle of the Deheubarth princes, built on a hill that carries earlier defences, so
      both readings describe something real on the site. Recorded as contested rather than
      resolved to whichever register we imported first.'
