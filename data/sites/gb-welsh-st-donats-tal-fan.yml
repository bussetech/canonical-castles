definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >
      On a knoll with artificially scarped slopes on all sides save the south and a
      wide ditch running around south, south-west and east, a curtain wall enclosed
      the site and "would have protected a keep and other associated castle buildings",
      placed to command the road north from Cowbridge — an enclosing defensive wall and
      earthworks around a lordly residential keep.
