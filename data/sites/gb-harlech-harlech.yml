definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Concentric Edwardian castle (begun 1283) whose gatehouse was "conceived as
      an independently defensible unit" with paired drum towers, portcullises and
      murder-holes (active defence meant to be held); the gatehouse held
      lavishly-appointed residential suites and the castle served as Owain
      Glyndŵr's residence and court 1404-1409 — a royal lord is still a lord, so
      both halves are met.
  popular_castle:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Explicitly designated a UNESCO World Heritage Site ("reflected by its
      designation as a World Heritage Site"), immortalised in the song "Men of
      Harlech" and a major operated monument — real public standing, not merely a
      register naming convention.
