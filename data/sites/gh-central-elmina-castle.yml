notes: 'Raised in the originating thread as a case where the strict definition and ordinary
  usage collide, and where the word does heavy and uncomfortable work: Elmina was a site of
  the transatlantic slave trade, and its dungeons are what most visitors come to see. UNESCO''s
  own inscription is titled ''Forts and Castles'' - using both words rather than choosing.
  A dataset that quietly resolves this to ''castle'' or quietly drops it is making a historical
  judgement while appearing to make a taxonomic one.'
