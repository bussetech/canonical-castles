definitions_met:
  state_fortification:
    verdict: 'yes'
    basis: Built and garrisoned by the Portuguese crown as a fortified trading post and later
      held by the Dutch and British states. State commission and military purpose, with no
      private lordly residence organising it.
  fortified_residence:
    verdict: 'no'
    basis: A garrison and trading establishment rather than the residence of a private lord.
      The resident governor held office from a state, which is the distinction the criterion
      turns on.
  popular_castle:
    verdict: 'yes'
    basis: Universally called Elmina Castle, a World Heritage site and one of the most visited
      historic sites in Ghana.
  palatial_seat:
    verdict: 'no'
    basis: Not a palatial residence.
  enclosure_fortification:
    verdict: 'no'
    basis: A designed artillery-era fort, not a prehistoric enclosure.
  revival_folly:
    verdict: 'no'
    basis: Genuine defensive fabric.
