definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw report FL062 records excavations concluded in 1957 showing an earthwork
      castle replaced in the early thirteenth century by a fortified manor house,
      abandoned in the late fourteenth — a lord's residence set within a ditched
      spur-end enclosure defended by a ditch and steep natural slopes. Earthwork and
      timber castles fall within this band; a castle is recorded here from 1157 and
      was captured in 1166, evidencing defensive tenure as well as residence.
