definitions_met:
  fortified_residence:
    verdict: 'yes'
    assessment: assessed
    basis: 'Built by Edward I from 1283 as "a secure residence for the king and a seat for the royal
      court" (a royal lord is still a lord). Active defence: a 3m-thick, up-to-27m-high curtain wall with
      eight round towers, a continuous wall walk, a west barbican and an entrance defended by drawbridge
      and portcullis. Residence: a great hall range, royal apartments and a vaulted royal chapel — "the
      most intact set of residential buildings left by the medieval English monarchy".'
  popular_castle:
    verdict: 'yes'
    assessment: assessed
    basis: 'The report cites the castle''s designation as a World Heritage Site and its standing as exceptional
      "not only for the grandeur of its high towers and curtain walls, but also for its excellent state
      of preservation" — public standing well beyond a mere naming convention.'
