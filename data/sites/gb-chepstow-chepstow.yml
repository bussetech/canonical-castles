notes: 'Assessed from Cadw''s full designation report (MM003). fortified_residence: yes — Great Tower,
  barbican, curtain walls, mural towers and the twin-towered gatehouse with flanking arrowloops are
  active defence, integrated with the earls'' domestic apartments and gloriette. revival_folly: no —
  an 11th-century-origin castle developed through the defensive era. popular_castle: yes — a judgment
  call resting on the report''s superlatives (oldest twin-towered gatehouse in Britain; oldest surviving
  castle doors in Europe), which mark a monument everybody has heard of, per band criterion. palatial_seat
  OMITTED: the earls'' apartments sit within a fully defended castle whose defences still govern, so
  the fortified_residence verdict covers them; no phase where fortification became merely decorative.
  Confidence medium: single official report plus register.'
