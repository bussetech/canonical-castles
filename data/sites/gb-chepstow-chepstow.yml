definitions_met:
  fortified_residence:
    verdict: 'yes'
    assessment: assessed
    basis: 'Cadw''s report describes a rectangular Great Tower, a heavily defended Upper Barbican, curtain
      walls, D-shaped mural towers and a main gatehouse of two round towers "well equipped with arrowloops
      to provide a wide field of fire" — the oldest twin-towered gatehouse in Britain, a gate meant
      to be held. Residence of earls (William fitz Osbern, William Marshal, Roger Bigod) with a domestic
      range and the earl''s gloriette. Combined lordly residence and active defence.'
  revival_folly:
    verdict: 'no'
    assessment: assessed
    basis: Begun in 1067 by William fitz Osbern, earl of Hereford, and developed through the medieval
      defensive era by Marshal and Bigod — a genuine great castle, not a post-defensive-era revival
      or sham.
  popular_castle:
    verdict: 'yes'
    assessment: assessed
    basis: The report records nationally famous features — the oldest twin-towered gatehouse in Britain
      and, dendrochronologically dated, "the oldest castle doors surviving in Europe" — the hallmarks
      of a major, widely-known monument a general audience would unhesitatingly call a castle.
