notes: >-
  Assessed 2026-07-22 from Cadw's full scheduled-monument report
  (sig-20260722-report-pe024). fortified_residence upgraded from
  register-derived to assessed on the strength of a held gatehouse plus
  documented episcopal residence. palatial_seat omitted rather than set: the
  report shows amenity (window seats, gardens, a chapel porch built for estate
  views, service-only polygonal towers) but the 14th-century gatehouse is a
  genuine defensive work that still governs the approach, so fortification is
  not a mere relic. All other bands omitted — the report does not speak to
  popular usage, revival/folly, state tenure, or an unlorded enclosure.
