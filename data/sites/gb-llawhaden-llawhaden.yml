definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Both halves met — the gatehouse has D-shaped towers on deeply spurred
      bases with arrow slits, a machicolation gallery, 'murder holes', a
      portcullis slot and vaulted guardhouses (a gatehouse meant to be held),
      set in a curtain wall with a wall walk; and it was the residence of the
      bishops of St David's (an ecclesiastical lord), rebuilt as a fortified
      mansion under Bishop Adam de Houghton.
