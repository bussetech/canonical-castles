notes: The single clearest demonstration that a castle dataset's headline number is a translation
  decision. Rank Versailles first among castles and 'castle' has come to mean 'grand old building';
  exclude it and a large fraction of what the public means by castle disappears. The register
  reference is the Monument historique identifier and should be re-verified against Base Merimee
  before being relied upon.
