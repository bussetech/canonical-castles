  locality: Versailles
  lat: 48.8049
  lon: 2.1204
built:
  from: 1623
  to: 1710
  period: hunting lodge 1623, progressively enlarged to 1710
condition: intact
definitions_met:
  palatial_seat:
    verdict: 'yes'
    basis: 'The definitive European palatial seat bearing a castle-word: Chateau de Versailles
      is a chateau in name with no fortification whatsoever, its defence being the French
      state rather than any wall.'
  fortified_residence:
    verdict: 'no'
    basis: Entirely unfortified. No wall walks, no parapets, no gatehouse meant to be held,
      no defensive intent at any phase. Fails the criterion completely.
  popular_castle:
    verdict: contested
    basis: 'English usage overwhelmingly calls it a palace, French usage calls it a chateau,
      and castle-aggregator datasets file it as a castle - thecastlemap ranks it #1 by fame.
      Usage genuinely differs by language, which is the whole difficulty.'
  state_fortification:
    verdict: 'no'
    basis: A royal residence and seat of government, never a military installation.
  enclosure_fortification:
    verdict: 'no'
    basis: No defensive enclosure.
  revival_folly:
    verdict: 'no'
    basis: A genuine early-modern residence, not a castle-form build for effect.
register_entries:
- register: fr-pop
  ref: PA00087661
  designation: Monument historique (classe)
disputed: true
dispute_note: 'Whether Versailles is popularly a castle is a translation artefact rather than
  a fact about the building: chateau maps to both ''castle'' and ''palace'' in English, and
  which one a dataset picks determines whether the most famous chateau in the world appears
  in its castle count. thecastlemap ranks it the single most famous castle on Earth.'
