definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: "Strong masonry castle of the de Brian lords — a stone curtain wall with two round towers, the NW tower acting as a keep, and a late-13th-century forward-projecting gatehouse with a defended entrance passage and postern; a fortified private lordly residence."
  palatial_seat:
    verdict: "yes"
    assessment: assessed
    basis: "In 1575 Sir John Perrot converted it into a comfortable Tudor mansion — the north curtain between the two round towers was demolished for a residential accommodation block, the wall heightened with mock battlements, and ranges built round a cobbled courtyard with a fountain and gardens; defensive fabric removed for amenity."
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: "A genuine 12th–14th-century defensive castle later slighted and left a romantic ruin, not a structure built as a sham; the mock battlements are a Tudor cosmetic addition and the original intent was defensive."
