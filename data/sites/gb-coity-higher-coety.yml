    basis: 'Coity was the caput of the lordship, held by the de Turberville family from the early 12th
      century and later the Gamages (identified lords). The inner ward has a faceted curtain wall incorporating
      a rectangular keep, a west gatehouse and a north-east gatehouse, all set behind a deep ditch and
      counterscarp bank — active defence held against siege in the 1405 Glyndwr rebellion. Domestic ranges
      (a first-floor hall over a vaulted undercroft, kitchen with ovens) supply the residence half.'
