notes: 'Assessed against the Cadw full report (GM004). fortified_residence yes — identified lords (de
  Turberville, later Gamage), a full defensive circuit (curtain, keep, two gatehouses, deep ditch and
  counterscarp) and residential ranges, held under siege in 1405. The 16th-century domestic remodelling
  (an added storey, new windows, two chimney stacks) improved amenity, but the report records no defensive
  fabric being removed for it, so palatial_seat is not assessed. No visitor/WHS usage evidence in the
  report, so popular_castle is omitted; the ringwork origin sits under an identified lordly residence,
  so enclosure_fortification does not apply. Confidence medium: single official report plus register.'
