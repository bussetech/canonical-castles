    basis: >
      Held within the Lordship of Pembroke, the coastal promontory ruin retains
      active defensive fabric — a gate tower and D-shaped barbican at the south-west
      entrance, a round central watch tower with a square stair turret, and embattled
      curtain wall — alongside "parts of domestic buildings", combining held defence
      and lordly residence.
