definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Curtain wall with three round towers enclosing the inner ward, a gatehouse
      with a 14th-century drawbridge pit (active defence meant to be held), and a
      two-storey hall block whose upper floor held the hall and the lord's solar
      (residence); held by Hubert de Burgh and later the Earl of Lancaster. Both
      the fortified and private-lordly-residence halves are met.
  palatial_seat:
    verdict: "yes"
    assessment: assessed
    basis: >-
      In the 14th century the castle "ceased to have a military function and was
      converted to provide suitable accommodation for the Earl of Lancaster",
      with "larger windows replacing the arrow slits", fireplaces and garderobes
      added and an elaborate ashlar chimney — defensive fabric relaxed for
      residential amenity, the retained-relic test for this band.
