definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw's report describes an inner and outer ward bounded by a curtain wall
      with wall-walks and rebuilt battlements, a twin-towered inner gatehouse, a
      simple outer gatehouse and flanking towers (the SE/Leyburn, SW/Great and
      N/Engine towers, the last adapted with a stepped ramp to mount a siege
      engine) — active defence meant to be held. It was the residence of the
      Welsh princes Llywelyn Fawr and Llywelyn ap Gruffydd, later reconstructed
      by Edward I. Both the active-defence and private-lordly-residence halves
      of the criterion are met.
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >-
      A 13th-century native Welsh castle, burnt in the 1404 Glyndŵr rising — a
      genuine medieval defensive work built within the defensive era, not a
      post-defensive-era castellated house or sham; fails the revival criterion.
