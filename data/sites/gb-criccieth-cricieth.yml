  fortified_residence verdict with an assessed yes and adding revival_folly: no.
  The report supplies curtain wall, wall-walks, battlements, a twin-towered
  inner gatehouse, an outer gatehouse, the Leyburn/Great/Engine towers, a
  postern and a cistern, and names the lords (Llywelyn Fawr, Llywelyn ap
  Gruffydd, later Edward I). popular_castle left UNASSESSED: this designation
  text shows no visitor operation or usage evidence, and the dataset does not
  inflate the one band with no register to check it. state_fortification omitted
  — the Edwardian reconstruction does not convert a Welsh princely castle into a
  state work; original seigneurial purpose governs. palatial_seat and
  enclosure_fortification omitted — the report does not speak to them. Confidence
  medium: one official report plus the register.
