definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >
      Cadw describes a defended promontory above the River Wye commanded by a large
      rock-cut vertical ditch to the north-west and a scarp to the river plain on
      west and south — deliberate defensive works, and Cadw's own designation frames
      the site as "a defended residence or stronghold". Only earthwork defence is
      observed here (no masonry, towers or gatehouse are described), so the verdict
      rests on the defensive siting and cut ditch rather than standing fabric.
