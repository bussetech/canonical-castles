definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >
      In its medieval phase the Clare lords of Glamorgan raised a stone fortress by
      c.1290 over an earlier earth-and-timber motte — a masonry apron, shell keep,
      three round towers (Kitchen, Keep and Well), a rectangular gatehouse and curtain
      wall — a lordly residence with real active defence, "destroyed militarily in the
      early 14th century" during the Welsh rebellions of 1314-1316.
  revival_folly:
    verdict: "yes"
    assessment: assessed
    basis: >
      The standing building is the "Gothic fairytale castle" raised in 1875 by William
      Burges for the third marquess of Bute — a purpose-built nineteenth-century
      romantic castle whose drawbridge and portcullis are picturesque novelties and
      whose interiors (Sleeping Beauty and Aesop's Fables schemes) are fantasy, built
      in castle form for aesthetic and status ends rather than defence.
  popular_castle:
    verdict: "yes"
    assessment: assessed
    basis: >
      A major operated monument of national importance for its Victorian Gothic-style
      architecture — Cadw calls it "the Gothic fairytale castle that can be seen
      today" — and one of the most recognised and visited castles in Wales.
