notes: >
  Assessed against Cadw's full report (GM206), a two-phase structure. The genuine
  medieval Clare fortress (motte, shell keep, round towers, gatehouse, destroyed
  militarily) carries fortified_residence: yes; the standing Burges/Bute building
  carries revival_folly: yes as a purpose-built Victorian romantic castle — the two
  are different phases, not an inconsistency. popular_castle: yes as a famous operated
  monument. palatial_seat OMITTED — the report shows fortification being added
  decoratively, not defences removed for amenity. Single Cadw source, confidence
  medium.
