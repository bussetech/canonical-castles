    basis: >-
      Cadw report CM085, which defines a castle as "a defended residence or
      stronghold... in which the principal or sole defence comprises the walls
      and towers bounding the site", records a twin-towered gateway c.7.6m high,
      a corner tower and a steep banked barbican with bank and ditch — active
      enclosing defence meant to be held for a lordly castle, meeting both
      halves.
