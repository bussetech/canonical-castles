notes: 'Carried deliberately to test whether the strict band is Eurocentric in practice as
  well as in origin. It is not: applied functionally, fortified_residence admits a shiro on
  the same terms as an Anglo-Norman keep. The tradition field locates Himeji without demoting
  it - which is why tradition is orthogonal to the bands rather than a band of its own. Note
  that OpenStreetMap reached the same conclusion by a different route, adopting castle_type=shiro
  as a first-class value (159 uses) instead of translating it away.'
