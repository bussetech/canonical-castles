definitions_met:
  fortified_residence:
    verdict: 'yes'
    basis: 'A fortified residence of a lord, satisfying the criterion on its own functional
      terms: defensible works - baileys, gatehouses meant to be held, loopholes, a spiral
      approach designed for defence - combined with the residence of a daimyo. The criterion
      is functional rather than geographic and Himeji meets it without needing a special case.'
  popular_castle:
    verdict: 'yes'
    basis: Japan's most visited castle, a National Treasure and World Heritage site, universally
      called a castle in both Japanese and English.
  palatial_seat:
    verdict: 'no'
    basis: Genuinely defensible rather than palatial; the defensive works govern the design.
  state_fortification:
    verdict: 'no'
    basis: A daimyo's seat under the shogunate rather than a state artillery installation.
  enclosure_fortification:
    verdict: 'no'
    basis: A designed lordly castle, not a prehistoric enclosure work.
  revival_folly:
    verdict: 'no'
    basis: Genuine defensive-era fabric, extensively conserved but not a romantic reconstruction.
