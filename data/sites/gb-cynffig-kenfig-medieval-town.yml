definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw's report describes a castle keep c.14×15m with walls c.2m thick
      standing 3–4m, its north wall best preserved and carrying an intact gun
      loop — a defensible residential strongpoint that satisfies the
      residence-and-defence test of a masonry castle. (The surrounding
      bank-and-ditch ramparts enclosing the 3.34ha borough are communal town
      defences and belong to a different band, not this half.)
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >-
      A medieval castle keep and fortified town with an intact gun loop
      indicating genuine artillery-era defensive use — not post-defensive-era
      castellated ornament or a sham; fails the revival criterion.
