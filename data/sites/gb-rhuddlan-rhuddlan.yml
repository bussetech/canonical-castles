    assessment: assessed
    basis: "A concentric Edwardian castle begun 1277: a diamond inner ward with twin-towered gatehouses at two angles and single flanking towers at the others, curtain walls surviving to the wall-walks (battlemented parapets now lost), and a walled moat — active defence built to be held. The inner ward held the king's hall and chamber, the queen's hall and chamber, the chapel, and a constable's residence — a fortified royal residence (a royal lord is still a lord)."
