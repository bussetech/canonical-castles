definitions_met:
  fortified_residence:
    verdict: 'yes'
    basis: 'The largest Anglo-Norman castle in Ireland: a genuine fortified private residence
      of a lord, with curtain wall, towers, gatehouses meant to be held, and a great keep
      serving as the lordly residence. Meets both halves of the criterion without strain.'
    assessment: assessed
  popular_castle:
    verdict: 'yes'
    basis: A major visitor attraction operated and signposted as a castle by the Office of
      Public Works.
  enclosure_fortification:
    verdict: 'no'
    basis: The curtain wall serves a lordly castle rather than standing as the primary work
      of an undefended-lordship enclosure.
  palatial_seat:
    verdict: 'no'
    basis: No palatial phase; it decayed rather than being rebuilt as a residence.
  state_fortification:
    verdict: 'no'
    basis: Seigneurial rather than state construction, built by Hugh de Lacy as lord of Meath.
  revival_folly:
    verdict: 'no'
    basis: A genuine medieval build, not a post-defensive-era romantic one.
