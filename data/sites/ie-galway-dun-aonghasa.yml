  county: Galway
  locality: Inishmore, Aran Islands
  lat: 53.1264
  lon: -9.7681
built:
  from: null
  to: null
  period: Bronze Age to Iron Age, with phases from c. 1100 BCE
condition: ruin
definitions_met:
  enclosure_fortification:
    verdict: 'yes'
    basis: A prehistoric multivallate promontory fort of concentric drystone enclosures on
      a cliff edge, with a chevaux-de-frise of set stones. The enclosure is the primary work
      and no lordly residence defines it.
  fortified_residence:
    verdict: 'no'
    basis: No identified lordly residence and no seigneurial tenure - the defining feature
      is the enclosure itself. Fails the private-residence half of the criterion, and its
      ritual as against defensive purpose is itself debated.
  popular_castle:
    verdict: contested
    basis: A major signposted heritage attraction that many visitors experience as a castle-equivalent,
      but Irish sources generally call it a fort, and a commenter in the originating thread
      named it specifically as something he would NOT consider a castle. Usage genuinely splits.
  palatial_seat:
    verdict: 'no'
    basis: No residential palatial phase.
  state_fortification:
    verdict: 'no'
    basis: Prehistoric, long predating any state military establishment.
  revival_folly:
    verdict: 'no'
    basis: A genuine prehistoric structure.
register_entries:
- register: ie-smr
  ref: GA110-012
  designation: Hillfort
disputed: true
dispute_note: 'Whether Dún Aonghasa is popularly a castle splits real usage: heritage signage
  and scholarship call it a fort, while general visitors and aggregator datasets frequently
  file it with castles. Recorded as contested rather than resolved, because resolving it would
  mean picking one audience over the other.'
