    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw report CD008 describes a concentric-walled castle with a twin-apsidal
      tower gateway carrying a pointed entrance, portcullis chase and crenellated
      parapet, round flanking towers to inner and outer wards, a mural tower and a
      dry moat — active defence built to be held, not merely a wall. A Royal Mint
      was later established "in the castle hall", evidencing the residential hall
      of the royal builder Edward I; a royal lord is still a lord under this band.
