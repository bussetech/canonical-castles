notes: >
  Upgraded to an assessed record from Cadw's full report (MM129).
  fortified_residence assessed 'no' — a 'defended manor house' by tradition
  whose only defensive fabric is a low enclosure wall with no external ditch and
  no active-defence features. enclosure_fortification left unassessed: the
  enclosure has an identified lordly residence, which that band excludes. The
  report's framing as a 'small medieval castle' is tradition, not demonstrated
  defence.
