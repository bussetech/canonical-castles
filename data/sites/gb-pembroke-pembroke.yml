definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw report PE005 describes a 22m round keep with battlements, curtain
      walls, round towers, and a Great Gatehouse with two portcullises, three
      machicolations, arrowslits and a barbican (active defence meant to be
      held), enclosing William Marshal's hall and private apartments and a later
      Great Hall, the castle held by the Marshal, de Valence and Hastings lords
      — both halves emphatically met.
  popular_castle:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Report PE005 records Pembroke as the birthplace of King Henry VII and the
      site of Cromwell's seven-week Civil War siege, brought back by a
      systematic 19th and early-20th century restoration programme into the
      presented monument it now is — a castle of exceptional public standing and
      one everybody has heard of, meeting the usage test.
