definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Both halves met — built by William Fitz Osbern as the fortified head of an
      independent Norman lordship, originally with a circular keep, a gatehouse
      and a curtain wall (destroyed in the Civil War); the surviving Great Tower
      held a first-floor hall and apartments over a cellar, and Edmund of
      Lancaster's Hall was used for holding courts.
