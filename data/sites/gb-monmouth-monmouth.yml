notes: >-
  Assessed 2026-07-22 from Cadw's full scheduled-monument report
  (sig-20260722-report-mm159). fortified_residence upgraded to assessed: keep,
  gatehouse and curtain wall (now lost) with a residential Great Tower, seat of
  an independent lordship. popular_castle omitted despite the keep's fame as the
  probable birthplace of Henry V — that is historical fame of the site, not
  evidence of a visitor operation or popular castle-usage in the report. Great
  Castle House now occupies the round-tower site but is a distinct later
  building, not this record. Civil War garrisoning does not make it a
  state_fortification (original seigneurial purpose governs). revival and
  enclosure bands omitted as unspoken.
