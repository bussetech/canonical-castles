notes: >-
  Upgraded from bulk register import to assessed verdicts. palatial_seat is
  OMITTED although the castle "was later incorporated into a Tudor house of the
  Kemeys family" and now sits in a modern garden: the report describes the
  surviving medieval defences and a later house built over the eastern range, but
  does not evidence defensive fabric removed for amenity, so the palatial phase is
  not affirmatively established. popular_castle omitted — "visible from several
  miles away" is prominence, not visitor operation or wide public standing.
  enclosure_fortification and state_fortification omitted. Confidence medium.
