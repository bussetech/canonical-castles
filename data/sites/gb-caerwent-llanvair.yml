definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      The FitzPayn family's manorial caput (they "held the manor"): a compact
      masonry ward with round flanking towers at N and S angles and a curtain wall
      standing 5m internally and 10m externally, defended by scarps and a dry
      ditch. The three-storey SW tower carries arrow-loop embrasures, a doorway
      onto the west curtain's parapet and joist-holes "for a timber gallery or
      hourd", enclosing a first-floor hall/chamber block — both active defence and
      lordly residence.
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >-
      A masonry castle of "the first half of the thirteenth century", later
      absorbed into a Tudor house; the medieval defensive intent governs, not a
      post-defensive folly.
