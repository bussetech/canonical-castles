definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >
      Established by the private lord William de Londres before c.1107 as a ringwork
      and bailey, later given a rectangular stone keep (walls 1.8m thick, west wall
      surviving to 12.5m), a faceted stone curtain wall entered by a gate passage, a
      re-cut rock ditch flooded by the river, and a 21m hall with domestic quarters —
      a defensible work and the residence of a named lord, both halves met.
