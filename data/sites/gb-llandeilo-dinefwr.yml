definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: "The seat of the Welsh rulers of Deheubarth (built by Rhys Gryg, d. 1233) and by Edward I's wars 'a formidable fortress' — a great round keep, a high angular curtain wall, a gatehouse, an entrance passage protected by a high wall, and a defensive bank with a deep rock-cut ditch; a fortified lordly residence."
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: "A genuine medieval fortress later romanticised — the keep top was converted to an 18th-century summer-house for Picturesque views — not a structure built as a sham; original defensive intent governs."
  popular_castle:
    verdict: "yes"
    assessment: assessed
    basis: "The keep-top summer-house 'became a famous landmark' and the castle drew 'artists, poets and tourist' in search of the Picturesque and Romantic — evidenced public standing as a visited monument."
