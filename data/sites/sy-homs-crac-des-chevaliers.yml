  date: '2006'
- url: https://en.wikipedia.org/wiki/Krak_des_Chevaliers
  title: Krak des Chevaliers
  publisher: Wikipedia
notes: UNESCO inscribed the property partly because its fortification systems 'substantially
  differed from European defense systems' - an official statement that the European template
  does not transfer cleanly. The tradition field records it as islamic-sphere to locate it
  geographically without implying the builders were; the crusader-state context is precisely
  what makes it interesting.
