    basis: >-
      Cadw report GM358 records a castle or fortified house on an artificially
      levelled rectangular platform defended on west and south by steep natural
      slopes and across the north and part of the east by a constructed ditch, with
      a rectangular residential building (14m by 12m) and an abutting courtyard.
      Defence and a lordly residence coincide on one site, satisfying both halves.
