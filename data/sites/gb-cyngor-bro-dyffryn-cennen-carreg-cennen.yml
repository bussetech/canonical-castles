definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw's report describes an outer ward with a curtain wall, drum towers and
      gate, an elaborate barbican whose stepped ramp is guarded by two gates
      over deep pits, and a central gatehouse — 'hub of the castle's defence' —
      flanked by a circular NW and square NE tower reached by wall-walks: active
      defence meant to be held. The east range holds the lord's living quarters
      (hall, kitchen, private apartments, chapel, cisterns). Held by the rulers
      of Deheubarth, then Edward I, then John Giffard (named lords). Both halves
      of the criterion are met.
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >-
      A 12th–14th-century castle, stronghold of Deheubarth then the Giffards,
      with a complete working defensive circuit — a genuine medieval fortress of
      the defensive era, not a post-defensive-era castellated house or sham.
