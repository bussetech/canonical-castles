notes: "Upgraded from register-derived to assessed against Cadw report MM274. The report cuts both ways on defensibility, so fortified_residence is contested (disputed flag set). palatial_seat is supported — an embattled Tudor mansion of the Morgan family whose castle-form fabric is a show façade. revival_folly is no — a 16th-century embattled residence with earlier medieval fabric and some real defence, a symbolic statement within the era rather than a post-defensive sham. popular_castle and the remaining bands are unassessed."
