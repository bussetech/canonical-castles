definitions_met:
  fortified_residence:
    verdict: contested
    assessment: assessed
    basis: "Cadw MM274 cuts both ways — the moated enclosure, gatehouse and round corner tower offered 'a degree of security' but 'more importantly' formed 'a suitably imposing show façade', with curtain walls under 1.5m thick and under 4m high, a postern lacking a draw-bar hole and a tower opening that is 'not an arrow loop'; genuine defensibility and decorative fortification are both argued in the report."
  palatial_seat:
    verdict: "yes"
    assessment: assessed
    basis: "Cadw MM274 calls Pencoed a 'towering early to mid-16th century embattled mansion of the Morgan family', among the best-preserved Tudor mansions in Wales, whose castle-form gatehouse and curtain walls form a show façade and status statement rather than serious defence."
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: "A 16th-century embattled mansion incorporating earlier medieval fabric and offering some real if modest defence — a symbolic status statement within the era, not a post-defensive sham castle or picturesque folly."
disputed: true
dispute_note: "Cadw's report both states the walls offered 'a degree of security' and stresses they 'more importantly' formed an imposing show façade, describing thin curtain walls, a postern without a draw-bar hole and a tower opening that is not an arrow loop. A militarist reading takes Pencoed as a genuinely fortified residence; a revisionist reading takes it as an essentially palatial embattled mansion whose fortification is display."
