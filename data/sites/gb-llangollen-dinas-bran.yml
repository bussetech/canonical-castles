definitions_met:
  enclosure_fortification:
    verdict: "yes"
    assessment: assessed
    basis: "A later prehistoric (probably Iron Age) univallate hillfort crowns the steep isolated summit, its rampart enclosing an undulating interior with visible possible hut sites and a probable south-west entrance — a defended enclosure with no identified lordly residence."
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: "A stone castle built in the 1260s by the lords of Powys Fadog occupies the hillfort's north-west corner; a rock-cut ditch, a keep well preserved on its south and west, an intermittent curtain wall and a typically Welsh apsidal tower give active defence, and the great hall or chapel with surviving arched windows housed the lord."
