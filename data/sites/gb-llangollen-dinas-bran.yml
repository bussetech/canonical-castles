notes: "Bands assessed against Cadw's full scheduled-monument report (DE021), which describes two phases. enclosure_fortification: yes for the Iron Age univallate hillfort on the summit; fortified_residence: yes for the 1260s stone castle of the lords of Powys Fadog built into the hillfort's north-west corner. Both hold at once — this is not an inconsistency but the two-phase site the report documents. Other bands omitted; the report does not speak to popular usage, palatial conversion, or folly. One official report, so confidence is medium."
