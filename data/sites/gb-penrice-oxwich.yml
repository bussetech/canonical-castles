definitions_met:
  fortified_residence:
    verdict: "no"
    assessment: assessed
    basis: "The report describes a wall-walk and ruined parapet and a gateway between drum turrets, but states outright that the gateway and curtain wall were 'anachronisms, for show only' with 'no serious defensive function'. The active-defence half fails on the report's own words — this is a courtyard house, not a defensible work."
  palatial_seat:
    verdict: "yes"
    assessment: assessed
    basis: "A high-status residence named Castell Oxwich: a large 16th-c Mansel courtyard house with a grand first-floor hall lit by huge mullioned windows, a second-floor long gallery — 'that essential ingredient of the grand Tudor house' — and a mock military gateway for show only. Castle-word name with decorative, non-functional fortification."
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: "The mock military gateway and show-only curtain assert lordly status in castle form, but this is an inhabited Tudor courtyard house, not scenery — a SYMBOLIC castle, not a SHAM one. Same reading as the Raglan reference: symbolic castellation within a real residence does not make a folly."
