notes: 'Assessed from Cadw''s full report (GM043), replacing the register-derived verdict.
  This is the case the register class most misleads on: Cadw''s own text calls the
  military features ''anachronisms, for show only'' with ''no serious defensive function'',
  so fortified_residence is a reasoned NO, not an omission — a real all-but finding.
  palatial_seat is YES (a grand Tudor courtyard house with long gallery bearing a castle
  name). revival_folly is NO (symbolic, not sham — an inhabited residence). The verdicts
  are independent, not driven off one another. enclosure_fortification, state_fortification
  and popular_castle OMITTED: the report does not speak to them, and gives no usage
  evidence for popular standing. Confidence medium: single official report plus register.'
