definitions_met:
  fortified_residence:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Built 1268-71 by Gilbert de Clare, lord of Glamorgan, as both fortress and
      residence. Active defence: concentric curtain walls, twin D-shaped
      gatehouses with portcullises at both ends, flanking corner towers and
      large-scale water defences (an identified lord's held work). Residence: the
      great ground-floor hall "was a sumptuous building" with well-appointed
      state apartments on the south of the inner ward.
  popular_castle:
    verdict: "yes"
    assessment: assessed
    basis: >-
      Cadw calls it "one of the great medieval castles of western Europe" and the
      second largest in Britain, famed for its leaning tower — a monument of wide
      public standing that a general audience recognises as a castle.
  revival_folly:
    verdict: "no"
    assessment: assessed
    basis: >-
      A 13th-century concentric castle, "a revolutionary masterpiece of military
      planning" within the defensive era; not a post-defensive folly or revival.
