notes: >-
  Upgraded from bulk register import to assessed verdicts against the Cadw full
  report. palatial_seat is OMITTED, not set: although the report describes
  sumptuous state apartments, the defensive fabric (concentric wards, gatehouses,
  water defences) genuinely governs, so it fails the "defences absent/vestigial"
  test rather than the report affirmatively speaking to a palatial phase. The
  adjacent 17th-century Civil War gun-platform earthwork is a field work, not a
  state fortification of this structure. enclosure_fortification and
  state_fortification omitted. Confidence medium: one official report plus the
  register.
