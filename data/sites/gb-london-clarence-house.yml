  date: '2026-07-21'
  note: '"It counts Clarence House in London in its top 100 as a world famous ''palace'' -
    it''s a Georgian townhouse."'
notes: The second false-positive control, and a more instructive one than the State Capitol
  because it is genuinely a royal residence. It shows that widening a castle dataset to 'castles,
  fortresses and palaces' does not fix the definitional problem - it relocates it, because
  'palace' is no better defined than 'castle' and now the boundary has to be drawn twice.
