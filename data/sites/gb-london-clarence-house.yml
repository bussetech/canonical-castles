definitions_met:
  palatial_seat:
    verdict: contested
    basis: A royal residence, and so palatial in status, but a Georgian stucco townhouse bearing
      no castle-word in its name. It meets the residence half of the band while failing the
      castle-word half, which the criterion requires as evidence.
  fortified_residence:
    verdict: 'no'
    basis: Entirely unfortified; a Regency townhouse by John Nash with no defensive features.
  popular_castle:
    verdict: 'no'
    basis: Nobody calls Clarence House a castle. It is called Clarence House.
  state_fortification:
    verdict: 'no'
    basis: Not a military work.
  enclosure_fortification:
    verdict: 'no'
    basis: No enclosure of any period on the site. The band requires a defended enclosure
      as the primary work; Clarence House is a Regency townhouse fronting a street, with no
      bank, ditch, rampart or defensive circuit.
  revival_folly:
    verdict: 'no'
    basis: Neoclassical rather than castle-form.
disputed: true
dispute_note: Included in thecastlemap's top 100 as a world-famous palace despite being a
  Georgian townhouse - flagged in the originating thread. The dispute is not about the building,
  which is uncontroversial, but about whether any castle dataset should contain it.
