notes: 'Imported in bulk from the Irish Sites and Monuments Record. CORROBORATED: Wikidata
  independently records this monument (Q126679057, joined on the SMR identifier) and classes
  it castle ruin, agreeing that it is a fortification. Two independent registers rather than
  one, hence confidence: medium. The verdict stays register-derived — corroboration is evidence,
  not assessment, and nobody has yet applied this band''s criterion to the structure itself.
  Only fortified_residence carries a verdict; every other band is OMITTED rather than set
  to no. The register''s own finer class is kept on the register_entry, so the strict Anglo-Norman
  reading stays recoverable from the data without re-querying the service.'
