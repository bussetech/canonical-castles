definitions_met:
  fortified_residence:
    verdict: 'yes'
    assessment: assessed
    basis: 'The medieval phase meets the criterion: three towered ranges set about a courtyard,
      a great hall flanked by two great towers on spurred bases, a walled forecourt, an outer
      court and a gatehouse — active defence organised around the residence of the de Carew
      lords, on a ridge commanding a tidal river crossing.'
  palatial_seat:
    verdict: 'yes'
    assessment: assessed
    basis: A later phase, and simultaneously true. After 1480 Rhys ap Thomas remodelled the
      castle into 'a comfortable Tudor palace with additions intended to achieve a more contemporary,
      uniform and decorative whole', and Sir John Perrot later REMOVED the northeast tower
      and north curtain to build a great north range. Defensive fabric was demolished to make
      a residence of display — the clearest possible evidence for this band.
  state_fortification:
    verdict: 'no'
    assessment: assessed
    basis: Held privately throughout — Gerald of Windsor, the de Carews, Rhys ap Thomas, Perrot.
  enclosure_fortification:
    verdict: 'no'
    assessment: assessed
    basis: Earlier prehistoric fortification is noted on the site, but the monument assessed
      here is the masonry castle built over it, not the enclosure work.
  revival_folly:
    verdict: 'no'
    assessment: assessed
    basis: Genuine medieval and Tudor fabric, not a post-defensive-era build in castle form.
  popular_castle:
    verdict: 'yes'
    assessment: assessed
    basis: Named and operated as Carew Castle, a major Pembrokeshire visitor attraction.
