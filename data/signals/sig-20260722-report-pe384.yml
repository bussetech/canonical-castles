  The monument consists of a part of the remains of a castle, dating to the medieval period.
  It comprises a part of the original ditch that protected the bailey of the early castle
  at Cilgerran and which later formed part of the defences of the outer ward, together with
  an area of the castle’s gatehouse, parts of which survive as low wall footings. The gatehouse’s
  date is uncertain though it is thought to be early in the castle’s history.

  The monument is of national importance for its potential to enhance our knowledge of medieval
  defensive practices. The monument is well-preserved and an important relic of the medieval
  landscape. It retains significant archaeological potential, with a strong probability of
  the presence of both structural evidence and intact associated deposits.

  The scheduled area comprises the remains described and areas around them within which related
  evidence may be expected to survive and is an addition to the scheduling of the majority
  of Cilgerran Castle as scheduled monument CM002.'
