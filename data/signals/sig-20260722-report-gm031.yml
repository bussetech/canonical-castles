  The monument comprises the remains of a castle, dating to the medieval period. It is located
  on the southern boundary of the Welsh lands of Senghennydd Is Caech on a ridge top overlooking
  the Cardiff plain. The ruined remains consist of a walled pentagonal enclosure about 40m
  in diameter with the angles defined by the remains of four towers and on the east a keep.
  It is thought to have been built in the mid thirteenth century and may not have been completed.

  The monument is of national importance for its potential to enhance our knowledge of medieval
  defensive and domestic practices. The monument is well-preserved and an important relic
  of the medieval landscape. It retains significant archaeological potential, with a strong
  probability of the presence of both structural evidence and intact associated deposits.

  The scheduled area comprises the remains described and areas around them within which related
  evidence may be expected to survive.'
