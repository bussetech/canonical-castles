# canonical-castles — a Bussetech Software Studio project site.
#
# Created from <org>/project-template by the studio factory (EPIC1-08).
# Double-underscore placeholders are filled by scripts/new-project.sh in
# the platform repo; if you can still see any, the fill step didn't run.
#
# Theme: pinned tag, never a branch (theme docs/versioning.md). Bump
# canary-first when a new theme version ships.
title: Canonical Castles
description: "Canonical Castles — how many castles are there? A source-cited dataset that answers per definition, not in general: every structure records which definitions of castle it satisfies, and every definition carries its own count and closure rule."
lang: en
url: "https://castles.bussetech.com"
baseurl: ""

remote_theme: bussetech/theme@v0.11.0
plugins:
  - jekyll-remote-theme

studio:
  logotype: "bussetech | software studio"
  org: bussetech
  domain: bussetech.com
  # public | private | private-published — must match this repo's entry in
  # the control repo's platform.yml. The theme keys its leak rule off it.
  visibility: public
  # Studio legal identity (EPIC2-01) — the footer copyright line. Filled by
  # the factory from the control repo's platform.yml branding.legal.copyright.
  legal:
    copyright: "© 2026 Eszett, LLC"
  # Cloudflare Web Analytics token, minted per live hostname by the DNS
  # steward into platform.yml (EPIC1-04). Backfill from there; not secret.
  analytics_beacon: "e5abd9ed0dc844bdadf574e0c5f3b611"
  # Email capture (platform ADR-0034). One shared studio list; the provider
  # holds the PII and this repo holds nothing but the dataset.
  signup:
    enabled: true
    rail: true
    rail_placement: "castles-rail"
    action: "https://buttondown.com/api/emails/embed-subscribe/bussetech"
    email_field: email
    heading: "Canonical Castles + Studio updates"
    value_prop: "Get a note when a coverage cell closes or a count claim is regraded - plus the occasional update on what the studio ships. No spam, no tracking."
    button_label: "Subscribe"
    privacy_note: "We store only your email, to send these updates, under the Eszett, LLC privacy notice. Double opt-in; unsubscribe any time."
    hidden:
      embed: "1"
    placement_field: "metadata__placement"
  nav:
    - title: Home
      url: /
    - title: Definitions
      url: /definitions/
    - title: Counts
      url: /counts/
    - title: Castles
      url: /castles/
    - title: Claims
      url: /claims/
    - title: Coverage
      url: /coverage/
    - title: Data
      url: /data/

# Jekyll reads site.data from data/ (not _data/) so the CI-validated record
# files are also the render source - one copy, no mirroring.
data_dir: data

markdown: kramdown
sass:
  style: compressed
  # Never emit source maps: for private-published sites a .map file is a
  # source leak (ADR-0006) and shared site CI fails on it; for public sites
  # it is dead weight. First proven live by test-factory's CI (EPIC1-08).
  sourcemap: never

# data/ and schema/ are deliberately NOT excluded: the published site serves
# the datasets and their schemas verbatim (research outputs are the point —
# and for private-published repos they are the shareable part).
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - CLAUDE.md
  - README.md
  - LICENSE
  - gnomes/
  - scripts/
  - .venv/
  - data-ci.yml
